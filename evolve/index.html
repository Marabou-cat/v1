<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution Lab - SchoolExams</title>
    <style>
        :root {
            --bg0: #0a0a0a; --bg1: #111; --bg2: #1a1a1a;
            --p0: #ff0055; --p1: #ff3377; --p2: #990033;
            --line: rgba(255, 0, 85, 0.2);
            --glow: 0 0 20px rgba(255, 0, 85, 0.4);
            --r: 16px;
        }

        body { 
            background: var(--bg0); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: center; padding: 40px 20px; overflow-x: hidden; margin: 0; min-height: 100vh;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .btn-back { align-self: flex-start; background: rgba(0, 0, 0, 0.85); border: 1px solid var(--p0); color: var(--p1); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 900; text-transform: uppercase; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--p0); color: #fff; box-shadow: var(--glow); transform: translateX(-5px); }

        .header h1 { color: var(--p1); font-size: 3.5rem; margin: 0 0 10px 0; text-shadow: var(--glow); text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #ccc; font-size: 1.1rem; margin: 0 0 30px 0; }
        
        .currency-bar { display: inline-flex; gap: 30px; background: rgba(0,0,0,0.8); border: 2px solid var(--p0); padding: 15px 30px; border-radius: 30px; margin-bottom: 40px; font-weight: bold; font-size: 18px; box-shadow: var(--glow); }
        .currency-bar .coins { color: #ffd700; }
        .currency-bar .gems { color: #00ffcc; }

        .lab-container { background: rgba(17, 17, 17, 0.85); border: 2px solid var(--p0); border-radius: var(--r); padding: 30px; max-width: 1000px; margin: 0 auto; backdrop-filter: blur(10px); box-shadow: var(--glow); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .evo-card { background: var(--bg2); border: 2px solid var(--line); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; position: relative; }
        .evo-card:hover { border-color: var(--p1); box-shadow: var(--glow); transform: translateY(-5px); }
        
        .evo-icons { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .pet-icon { font-size: 40px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid #444; }
        .evo-arrow { color: var(--p1); font-weight: bold; font-size: 24px; animation: pulseArrow 1s infinite alternate; }
        
        @keyframes pulseArrow { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.2); opacity: 1; } }

        .btn-evo { background: var(--p0); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-evo:hover { background: var(--p1); box-shadow: 0 0 15px var(--p1); color: #000; }
        .btn-evo:disabled { background: transparent; color: #777; cursor: not-allowed; box-shadow: none; border: 2px dashed #555; }

        /* EVO ANIMATION MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: var(--bg1); border: 2px solid var(--p1); padding: 50px; border-radius: var(--r); text-align: center; box-shadow: var(--glow); max-width: 450px; animation: popIn 0.5s ease-out; }
        
        .dna-icon { font-size: 80px; margin: 20px 0; animation: spinDNA 3s linear infinite; filter: drop-shadow(0 0 20px var(--p1)); }
        @keyframes spinDNA { 100% { transform: rotate(360deg); } }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #toast { position: fixed; bottom: 20px; right: 20px; background: #3ba55c; color: white; padding: 15px 25px; border-radius: 10px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div style="text-align: left; max-width: 1000px; margin: 0 auto;">
        <a href="../" class="btn-back">← Return to Portal</a>
    </div>

    <div class="header">
        <h1>🧬 Evolution Lab</h1>
        <p>Mutate your pets into powerful new forms. Evolutions retain their previous level!</p>
    </div>

    <div class="currency-bar">
        <div class="coins">🪙 <span id="coinDisplay">0</span> Coins</div>
        <div class="gems">💎 <span id="gemDisplay">0</span> Gems</div>
    </div>

    <div class="lab-container">
        <h2 style="color: var(--p1); border-bottom: 2px dashed var(--p0); padding-bottom: 10px; margin-top: 0; text-align: left;">Eligible Pets in Inventory</h2>
        <div class="grid" id="evoGrid">
            <div style="color: gray; width: 100%; text-align: center; grid-column: 1/-1;">Loading DNA Sequences...</div>
        </div>
    </div>

    <div class="modal" id="evoModal">
        <div class="modal-box">
            <h2 style="color: var(--p1); margin-top:0; font-size: 28px;">MUTATION COMPLETE</h2>
            <div id="evoIcon" class="dna-icon">🧬</div>
            <p id="evoDesc" style="font-size: 18px; font-weight: bold; line-height: 1.5; color: #fff;"></p>
            <button class="btn-evo" style="margin-top: 25px; border: none; background: var(--p1); color: #000;" onclick="document.getElementById('evoModal').style.display='none'">AWESOME!</button>
        </div>
    </div>

    <div id="toast">Evolution Successful!</div>

<script>
// --- STATIC VISUAL MAPPINGS ---
const PET_SHOP = [
    { id: "doge", name: "Pixel Doge", icon: "🐕" }, 
    { id: "cat", name: "Cyber Kitty", icon: "🐈" },
    { id: "frog", name: "Ninja Frog", icon: "🐸" }, 
    { id: "lt", name: "Living Treasure", icon: "🪙" },
    { id: "kitsune", name: "Sakura Kitsune", icon: "🦊" }
];

// --- GAMER CARDS CONFIGURATION ---
const GAMER_CARDS = [
    { id: "raging_noob", name: "Raging Noob", icon: "<img src='../png/raging_noob.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#0077b6" },
    { id: "good_morning", name: "Good Morning!", icon: "<img src='../png/good_morning.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#0077b6" },
    { id: "dog_trainer", name: "Dog Trainer", icon: "<img src='../png/dog_trainer.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#7f00ff" },
    { id: "royal_knight", name: "Royal Knight", icon: "<img src='../png/royal_knight.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#ffd700" },
    { id: "speedrunner", name: "Speedrunner", icon: "<img src='../png/speedrunner.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#7f00ff" },
    { id: "power_of_care", name: "Power Of Care", icon: "<img src='../png/power_of_care.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#0077b6" },
    { id: "investor", name: "Investor", icon: "<img src='../png/investor.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#7f00ff" },
    { id: "evolution_scientist", name: "Evolution Scientist", icon: "<img src='../png/evolution_scientist.png' style='height: 2em; width: 2em; object-fit: contain;'>", color: "#ffd700" }
];

const GamerCardAbilities = {
    "evolution_scientist": {
        name: "Science Experience",
        desc: "Reduces the cost of Evolution in Evolution Lab by 90%",
        type: "evo_discount",
        discountPercent: 90 
    }
    // (Other abilities aren't strictly needed in the Evo Lab since it only handles evolutions, 
    // but you can paste the rest here if you want to display them eventually!)
};

// ADDED equipped_gamer_card to the state
let gameState = { coins: 0, gems: 0, owned_pets: [], levels: {}, equipped_gamer_card: "" };
let EVO_CATALOG = {};

async function loadGameFromServer() {
    try {
        const formData = new FormData(); 
        formData.append('action', 'load');
        
        const res = await fetch('../evolve_backend.php', { method: 'POST', body: formData });
        const result = await res.json();
        
        if (result.success) {
            gameState.coins = parseInt(result.coins) || 0;
            gameState.gems = parseInt(result.gems) || 0;
            gameState.owned_pets = result.owned_pets || [];
            gameState.levels = result.levels || {};
            EVO_CATALOG = result.catalog || {};
            
            // CAUGHT THE EQUIPPED CARD FROM PHP:
            gameState.equipped_gamer_card = result.equipped_gamer_card || "";
            
            document.getElementById('coinDisplay').innerText = gameState.coins.toLocaleString();
            document.getElementById('gemDisplay').innerText = gameState.gems.toLocaleString();
            
            renderEvoLab();
        } else {
            console.error("Backend Error:", result.message);
            document.getElementById('evoGrid').innerHTML = `<div style="grid-column: 1/-1; color: #ff4444; padding: 40px; border: 2px dashed #ff4444; border-radius: 16px;">Error loading data: ${result.message}</div>`;
        }
    } catch(e) { 
        console.error("Failed to load state.", e); 
        document.getElementById('evoGrid').innerHTML = `<div style="grid-column: 1/-1; color: #ff4444; padding: 40px; border: 2px dashed #ff4444; border-radius: 16px;">Failed to connect to the Evolution Server.</div>`;
    }
}

function renderEvoLab() {
    const grid = document.getElementById('evoGrid');
    grid.innerHTML = '';
    let foundEligible = false;

    gameState.owned_pets.forEach(petUid => {
        const baseId = petUid.split('::')[0];
        
        if (EVO_CATALOG[baseId]) {
            foundEligible = true;
            const recipe = EVO_CATALOG[baseId];
            
            const fromPet = PET_SHOP.find(p => p.id === baseId) || { name: recipe.base_name, icon: "🐾" };
            const targetColor = recipe.color || '#ff3377';
            const toPetIcon = recipe.img 
                ? `<img src="${recipe.img}" style="width: 2em; height: 2em; object-fit: contain;">`
                : `🧬`;

            const level = gameState.levels[petUid] || 1;
            const isLevelMet = level >= recipe.req_level;
            
            let currencyVal = recipe.currency === 'gems' ? gameState.gems : gameState.coins;
            let currencyIcon = recipe.currency === 'gems' ? '💎' : '🪙';
            
            // --- Calculate Discounted Cost ---
            let finalCost = recipe.cost;
            if (gameState.equipped_gamer_card) {
                let gcAbility = GamerCardAbilities[gameState.equipped_gamer_card];
                if (gcAbility && gcAbility.type === "evo_discount") {
                    let discountAmount = finalCost * (gcAbility.discountPercent / 100);
                    finalCost = Math.max(0, Math.floor(finalCost - discountAmount));
                }
            }

            const canAfford = currencyVal >= finalCost;

            let btnHTML = '';
            if (!isLevelMet) {
                btnHTML = `<button class="btn-evo" disabled>Needs Lvl ${recipe.req_level}</button>`;
            } else if (!canAfford) {
                btnHTML = `<button class="btn-evo" disabled>Not Enough ${recipe.currency}</button>`;
            } else {
                btnHTML = `<button class="btn-evo" onclick="evolvePet('${petUid}', '${baseId}')">
                    Evolve (${finalCost.toLocaleString()} ${currencyIcon})
                </button>`;
            }

            grid.innerHTML += `
                <div class="evo-card" style="border-color: ${targetColor}50;">
                    <div class="evo-icons">
                        <div class="pet-icon">${fromPet.icon}</div>
                        <div class="evo-arrow" style="color: ${targetColor}">⮞</div>
                        <div class="pet-icon" style="border-color: ${targetColor}; box-shadow: 0 0 15px ${targetColor}80;">${toPetIcon}</div>
                    </div>
                    <h3 style="margin: 0 0 5px 0; font-size: 16px;">${fromPet.name} <br>⮞ <span style="color: ${targetColor}">${recipe.target_name}</span></h3>
                    <p style="font-size: 12px; color: #aaa; margin: 0 0 10px 0;">Current: Lv. ${level} • Required: Lv. ${recipe.req_level}</p>
                    ${btnHTML}
                </div>
            `;
        }
    });

    if (!foundEligible) {
        grid.innerHTML = `<div style="grid-column: 1/-1; color: gray; padding: 40px; border: 2px dashed #444; border-radius: 16px;">No eligible base pets found in your inventory. You need a base pet (like Cyber Kitty, Living Treasure, etc) to evolve them!</div>`;
    }
}

async function evolvePet(uid, baseId) {
    const recipe = EVO_CATALOG[baseId];
    if (!recipe) return;

    const fd = new FormData();
    fd.append('action', 'evolve');
    fd.append('uid', uid); 
    
    try {
        const res = await fetch('../evolve_backend.php', { method: 'POST', body: fd });
        const result = await res.json();

        if (result.success) {
            if (recipe.currency === 'gems') gameState.gems = result.new_balance;
            else gameState.coins = result.new_balance;
            
            document.getElementById('coinDisplay').innerText = gameState.coins.toLocaleString();
            document.getElementById('gemDisplay').innerText = gameState.gems.toLocaleString();

            await loadGameFromServer();
            
            const targetColor = recipe.color || '#ff3377';
            const toPetIcon = recipe.img 
                ? `<img src="${recipe.img}" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px ${targetColor});">`
                : `🧬`;

            document.getElementById('evoIcon').innerHTML = toPetIcon;
            document.getElementById('evoIcon').style.animation = 'none'; 
            
            document.getElementById('evoDesc').innerHTML = `
                Your pet has successfully mutated into the <br>
                <span style="color: ${targetColor}; font-size: 28px;">${result.target_name}</span>!<br><br>
                <span style="color: #aaa; font-size: 14px;">(It retained its previous level and age)</span>
            `;
            
            document.getElementById('evoModal').style.display = 'flex';
        } else {
            alert("❌ " + result.message);
        }
    } catch(e) {
        alert("❌ Server Error while evolving.");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// Boot up
loadGameFromServer();
</script>
</body>
</html>
