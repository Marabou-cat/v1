<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SchoolExams V1</title>
<style>
:root {
    /* DEEP DARK BLUE THEME */
    --bg0: #000814;    /* Midnight */
    --bg1: #001d3d;    /* Navy */
    --bg2: #003566;    /* Deep Blue */
    --p0: #0077b6;     /* Primary Blue */
    --p1: #90e0ef;     /* Cyan Highlight */
    --p2: #03045e;     /* Solid Navy */
    --w: #caf0f8;      /* Text Light */
    --m: #90e0ef;      /* Muted Cyan */
    --d: #48cae4;      /* Dimmed Cyan */
    --line: rgba(144, 224, 239, 0.2);
    --glass: rgba(0, 29, 61, 0.85);
    --shadow: 0 12px 40px rgba(0,0,0,0.7);
    --r: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg0);
    color: var(--w);
    overflow-x: hidden;
}

.bg-grid {
    position: fixed; inset: 0; z-index: -1;
    background-image: linear-gradient(var(--line) 1px, transparent 1px), 
                      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 40px 40px;
}

header.topbar {
    position: fixed; top: 0; left:0; right:0; height: 64px;
    background: var(--bg1); border-bottom: 2px solid var(--p0);
    display: flex; align-items: center; padding: 0 24px; z-index: 1000;
    justify-content: space-between;
}

.brand { font-weight: 900; font-size: 22px; color: var(--p1); text-decoration: none; letter-spacing: -1px; }

.nav-btns { display: flex; gap: 10px; }
.btn-nav {
    background: var(--p2); border: 1px solid var(--p0); color: var(--w);
    padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600;
    transition: 0.2s; font-size: 13px;
}
.btn-nav:hover { background: var(--p0); color: #fff; }

.main { padding: 100px 24px 40px; max-width: 1200px; margin: 0 auto; }

.hero { text-align: center; margin-bottom: 40px; }
.hero h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to bottom, #fff, var(--p1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { color: var(--d); font-weight: 500; }

.searchWrap { margin-bottom: 30px; }
.searchWrap input {
    width: 100%; padding: 16px 24px; border-radius: var(--r);
    background: var(--bg1); border: 1px solid var(--p0);
    color: #fff; font-size: 16px; outline: none; box-shadow: 0 0 20px rgba(0,119,182,0.2);
}

.gamesGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px;
}

.gameCard {
    background: var(--bg1); border: 1px solid var(--line); border-radius: var(--r);
    overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s;
}
.gameCard:hover { transform: translateY(-5px); border-color: var(--p1); }

.gameIcon { height: 90px; background: var(--p2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
.gameName { padding: 12px; font-size: 12px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* FULLSCREEN OVERLAYS */
.overlay {
    position: fixed; inset: 0; background: var(--bg0); z-index: 2000; display: none; flex-direction: column;
}
.overlay.open { display: flex; }

.overlay-bar {
    height: 56px; background: var(--bg1); display: flex; align-items: center; 
    padding: 0 16px; border-bottom: 2px solid var(--p0); justify-content: space-between;
}

.bar-title { font-weight: 800; font-size: 14px; color: var(--p1); }

.btn-close {
    background: #c42b1c; border: none; color: #fff; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 12px;
}

iframe { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }

/* BROWSER STYLES */
.browserWin { width: 90vw; height: 85vh; border-radius: var(--r); overflow: hidden; display: flex; flex-direction: column; background: var(--bg1); border: 1px solid var(--p0); box-shadow: var(--shadow); }
.browserOverlay { position: fixed; inset:0; background: rgba(0,0,0,0.7); z-index: 3000; display: none; align-items: center; justify-content: center; }
.browserOverlay.open { display: flex; }
</style>
</head>
<body>

<div class="bg-grid"></div>

<header class="topbar">
    <a href="#" class="brand" onclick="location.reload()">SchoolExams 🔵</a>
    <div class="nav-btns">
        <button class="btn-nav" onclick="openBrowser()">🌐 Web Browser</button>
    </div>
</header>

<main class="main">
    <section class="hero">

</main>

<div class="overlay" id="gameOverlay">

    </div>
    <iframe id="gameFrame" src=""></iframe>
</div>

function renderGrid(filter = "") {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = "";
    
    GAMES.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
        const card = document.createElement('div');
        card.className = 'gameCard';
        card.onclick = () => openGame(game.f, game.name);
        
        card.innerHTML = `
            <div class="gameIcon">📘</div>
            <div class="gameName">${game.name}</div>
        `;
        grid.appendChild(card);
    });
}

function openGame(file, title) {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    document.getElementById('activeTitle').textContent = title;
    frame.src = BASE_URL + file;
    overlay.classList.add('open');
}

function closeGame() {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    frame.src = "";
    overlay.classList.remove('open');
}

function openBrowser() {
    const overlay = document.getElementById('browserOverlay');
    const frame = document.getElementById('browserFrame');
    // Using a common proxy/lite browser as per original concept
    frame.src = "https://mb.webs.vc"; 
    overlay.classList.add('open');
}

function closeBrowser() {
    document.getElementById('browserOverlay').classList.remove('open');
    document.getElementById('browserFrame').src = "";
}

document.getElementById('searchInput').oninput = (e) => {
    renderGrid(e.target.value);
};
