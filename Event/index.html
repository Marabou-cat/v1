<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diamond Crack Event</title>
    <style>
        :root { --p1: #90e0ef; --bg: #000814; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .task-list { max-width: 600px; margin: 20px auto; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
        .task-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
        .task-item.done { color: #3ba55c; text-decoration: line-through; }
        
        #diamond-container { margin: 40px auto; width: 200px; cursor: pointer; transition: 0.1s; position: relative; }
        #diamond-container:active { transform: scale(0.9); }
        .cracked { animation: shake 0.5s; filter: hue-rotate(90deg); }
        @keyframes shake { 0% {left:0} 25% {left:5px} 50% {left:-5px} 75% {left:5px} 100% {left:0} }
        
        .reward-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn-claim { background: #ffd700; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💎 Diamond Crack Event</h1>
    <p>Complete tasks on the main portal to earn "Crack Points". Click the Diamond to claim rewards!</p>

    <div id="diamond-container" onclick="attemptCrack()">
        <img id="diamondImg" src="Diamond.png" style="width: 100%;">
        <h3 id="pointsDisplay">Points: 0</h3>
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="reward-popup" id="rewardPopup">
        <h2 id="rewardTitle">CONGRATULATIONS!</h2>
        <div id="rewardIcon" style="font-size: 80px;"></div>
        <p id="rewardDesc"></p>
        <button class="btn-claim" onclick="location.reload()">CLAIM & CONTINUE</button>
    </div>

<script>
const TASK_DEFS = [
    { id: 1, type: 'feed_pet', name: 'Feed your Pet 5 times', goal: 5, points: 1 },
    { id: 2, type: 'open_module', name: 'Launch 10 Modules', goal: 10, points: 1 },
    { id: 3, type: 'play_minutes', name: 'Play for 30 Minutes', goal: 30, points: 1 },
    { id: 4, type: 'feed_pet', name: 'Master Caretaker (Feed 20 times)', goal: 20, points: 2 },
    { id: 5, type: 'open_module', name: 'Explorer (Launch 25 Modules)', goal: 25, points: 2 },
    { id: 6, type: 'play_minutes', name: 'Veteran (Play for 60 Minutes)', goal: 60, points: 3 },
    { id: 7, type: 'feed_pet', name: 'Pet Whisperer (Feed 50 times)', goal: 50, points: 3 },
    { id: 8, type: 'open_module', name: 'Module Maniac (Launch 50 Modules)', goal: 50, points: 3 },
    { id: 9, type: 'play_minutes', name: 'Addict (Play for 120 Minutes)', goal: 120, points: 5 },
    { id: 10, type: 'feed_pet', name: 'Pet Royalty (Feed 100 times)', goal: 100, points: 5 },
    { id: 11, type: 'open_module', name: 'Grandmaster (Launch 100 Modules)', goal: 100, points: 5 },
    { id: 12, type: 'play_minutes', name: 'No Lifing It (Play for 240 Minutes)', goal: 240, points: 10 }
];

function initTasks() {
    if (!localStorage.getItem('event_tasks')) {
        let tasks = TASK_DEFS.map(t => ({...t, current: 0, completed: false, claimed: false}));
        localStorage.setItem('event_tasks', JSON.stringify(tasks));
    }
    renderTasks();
}

function renderTasks() {
    const tasks = JSON.parse(localStorage.getItem('event_tasks'));
    const container = document.getElementById('taskList');
    let points = 0;
    
    container.innerHTML = "";
    tasks.forEach(t => {
        if (t.completed && !t.claimed) points += t.points;
        const div = document.createElement('div');
        div.className = `task-item ${t.completed ? 'done' : ''}`;
        div.innerHTML = `<span>${t.name} (+${t.points} Pt)</span> <span>${t.current}/${t.goal}</span>`;
        container.appendChild(div);
    });
    document.getElementById('pointsDisplay').innerText = `Ready to Crack: ${points}`;
}

async function attemptCrack() {
    let tasks = JSON.parse(localStorage.getItem('event_tasks'));
    let claimable = tasks.find(t => t.completed && !t.claimed);
    
    if (!claimable) {
        alert("Complete more tasks to earn Crack Points!");
        return;
    }

    // Animation
    const img = document.getElementById('diamondImg');
    img.classList.add('cracked');
    
    setTimeout(async () => {
        img.classList.remove('cracked');
        claimable.claimed = true;
        localStorage.setItem('event_tasks', JSON.stringify(tasks));
        
        // Random Reward Logic
        let rand = Math.random() * 100;
        let reward = { type: 'gems', amount: 50, icon: '💎' };
        
        if (rand < 5) { // 5% Pet
            reward = { type: 'pet', id: 'phoenix', name: 'Mythic Phoenix', icon: '🔥' };
        } else if (rand < 10) { // 5% Cursor (Wait, 10% cumulatively so another 5%)
            reward = { type: 'cursor', id: 'prism', name: 'Prism Wing', icon: '🌈' };
        }

        await saveRewardToBackend(reward);
        showReward(reward);
    }, 500);
}

async function saveRewardToBackend(reward) {
    const formData = new FormData();
    formData.append('action', 'event_reward');
    formData.append('reward_data', JSON.stringify(reward));
    await fetch('../backend.php', { method: 'POST', body: formData });
}

function showReward(res) {
    document.getElementById('rewardPopup').style.display = 'flex';
    document.getElementById('rewardIcon').innerHTML = res.icon;
    document.getElementById('rewardDesc').innerText = `You unlocked: ${res.name || res.amount + ' Gems'}`;
}

initTasks();
</script>
</body>
</html>
