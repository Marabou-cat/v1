<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Kawaii Event - SchoolExams</title>
    <style>
        :root {
            --bg0: #2a081d; --bg1: #4a1532; --bg2: #701f49;
            --p0: #ff748c; --p1: #ffb7b2; --p2: #ff4d6d;
            --line: rgba(255, 183, 178, 0.15);
            --glow: 0 0 20px rgba(255, 116, 140, 0.5);
            --r: 16px;
        }

        body { 
            background: var(--bg0); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; 
            text-align: center; padding: 40px 20px; overflow-x: hidden; margin: 0;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .header { margin-bottom: 20px; }
        .header h1 { color: var(--p1); font-size: 3rem; margin: 0 0 10px 0; text-shadow: var(--glow); text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #ffd6e0; font-size: 1.1rem; margin: 0; }
        
        .currency-bar { display: inline-flex; gap: 30px; background: rgba(0,0,0,0.6); border: 2px solid var(--p0); padding: 12px 30px; border-radius: 30px; margin-bottom: 20px; font-weight: bold; font-size: 18px; box-shadow: var(--glow); }
        .currency-bar .sakura { color: var(--p1); text-shadow: 0 0 10px var(--p1); }
        .currency-bar .gems { color: #00ffcc; }

        .exchange-btn { background: transparent; border: 2px dashed #00ffcc; color: #00ffcc; padding: 8px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; display: block; margin: 0 auto 30px auto; }
        .exchange-btn:hover { background: rgba(0, 255, 204, 0.1); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        #tree-container { 
            margin: 0 auto 40px auto; width: 220px; height: 220px; cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(255, 116, 140, 0.2) 0%, transparent 70%); border-radius: 50%;
        }
        #tree-container:hover { transform: scale(1.05); }
        #tree-container:active { transform: scale(0.95); }
        
        .shaking { animation: shake 0.4s infinite; filter: brightness(1.2); }
        @keyframes shake { 0% {transform: rotate(0deg)} 25% {transform: rotate(5deg)} 50% {transform: rotate(-5deg)} 75% {transform: rotate(5deg)} 100% {transform: rotate(0deg)} }
        
        #pointsDisplay { position: absolute; bottom: -20px; background: var(--p2); padding: 5px 15px; border-radius: 12px; font-weight: 900; box-shadow: var(--glow); border: 2px solid var(--p1); }

        /* SHOP SECTION */
        .shop-section { background: rgba(74, 21, 50, 0.6); border: 2px solid var(--p0); border-radius: 20px; padding: 30px; max-width: 900px; margin: 0 auto 40px auto; backdrop-filter: blur(10px); }
        .shop-section h2 { color: var(--p1); margin-top: 0; border-bottom: 2px dashed var(--p0); padding-bottom: 10px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .shop-card { background: var(--bg0); border: 2px solid var(--line); border-radius: 12px; padding: 20px; text-align: center; transition: 0.3s; display: flex; flex-direction: column; align-items: center;}
        .shop-card:hover { border-color: var(--p1); box-shadow: var(--glow); transform: translateY(-5px); }
        .shop-card img { height: 80px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .btn-buy { background: var(--p0); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: auto; cursor: pointer; transition: 0.2s; }
        .btn-buy:hover { background: var(--p1); color: var(--bg0); }
        .btn-buy-chest { background: linear-gradient(135deg, #ff748c, #ffb7b2); color: #000; box-shadow: 0 0 15px rgba(255, 183, 178, 0.5); }
        .btn-buy-gems { background: linear-gradient(135deg, #00ffcc, #0099ff); color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        /* TASKS */
        .task-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto; }
        .task-card { background: rgba(0, 0, 0, 0.4); border: 2px solid var(--p2); border-radius: var(--r); padding: 20px; text-align: left; transition: 0.3s; position: relative; overflow: hidden; }
        .task-card.done { border-color: #3ba55c; background: rgba(59, 165, 92, 0.1); }
        .task-card.claimed { border-color: #555; opacity: 0.6; }
        .task-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-pts { background: var(--p1); color: #000; padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 900; }
        .progress-bg { background: var(--bg0); height: 12px; border-radius: 6px; overflow: hidden; margin-top: 15px; border: 1px solid var(--p2); }
        .progress-fill { background: var(--p1); height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--p1); }
        .done .progress-fill { background: #3ba55c; box-shadow: 0 0 10px #3ba55c; }

        .reward-popup { display: none; position: fixed; inset: 0; background: rgba(42, 8, 29, 0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .reward-box { background: var(--bg1); border: 2px solid var(--p1); padding: 40px; border-radius: var(--r); text-align: center; box-shadow: var(--glow); max-width: 400px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--p0); color: white; padding: 15px 25px; border-radius: 10px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.3s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌸 Kawaii Festival</h1>
        <p>Play Different Games To Get Sakura Coins!</p>
    </div>

    <div class="currency-bar">
        <div class="sakura">🌸 <span id="sakuraDisplay">0</span> Sakura Coins</div>
        <div class="gems">💎 <span id="gemDisplay">0</span> Gems</div>
    </div>

    <button class="exchange-btn" onclick="exchangeGems()">Convert 150 💎 ➞ 500 🌸</button>

    <div id="tree-container" onclick="shakeTree()">
        <div id="treeImg" style="font-size: 120px; filter: drop-shadow(0 0 15px rgba(255, 183, 178, 0.8));">🌸</div>
        <div id="pointsDisplay">Ready to Shake: 0</div>
    </div>

    <div class="shop-section">
        <h2>🛍️ Limited Kawaii Shop</h2>
        <div class="shop-grid" id="kawaiiShopGrid">
            <div style="color: gray;">Loading Shop...</div>
        </div>
    </div>

    <div class="task-grid" id="taskList"></div>

    <div class="reward-popup" id="rewardPopup">
        <div class="reward-box">
            <h2 id="rewardTitle" style="color: var(--p1); margin-top:0; font-size: 28px;">KAWAII REWARD!</h2>
            <div id="rewardIcon" style="font-size: 90px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); margin: 20px 0;">🌸</div>
            <p id="rewardDesc" style="font-size: 18px; font-weight: bold; line-height: 1.5; color: #fff;"></p>
            <button class="btn-buy" style="margin-top: 25px;" onclick="document.getElementById('rewardPopup').style.display='none'">YAY!</button>
        </div>
    </div>

    <div id="toast">Data Synced Successfully</div>

<script>
// --- GAME STATE & BACKEND SYNC ---
let gameState = null;
const MAX_PETS = 50;
const MAX_CURSORS = 40;

// Pool of games to randomly generate tasks for
const GAME_POOL = ['3 Dash', 'Snow Rider 3D', 'Space Wave', 'Five Nights At Epsteins', '1 On 1 Soccer', 'BitLife', 'NHL 2002', 'Monkey Mart', 'Raft', 'Extreme Run 3D', 'Two Ball 3D'];

// --- KAWAII SHOP CATALOG ---
const KAWAII_SHOP = [
    { type: 'currency', id: 'buy_gems', name: '100 Gems', icon: '💎', desc: 'Exchange Sakura Coins back to Gems!', cost: 500, color: '#00ffcc' },
    { type: 'cursor', id: 'prism', name: 'Prism Wing', img: '../png/Prism.png', desc: 'Exclusive Event Cursor', cost: 1500 },
    { type: 'pet', id: 'phoenix', name: 'Mythic Phoenix', img: '../png/phoenix.png', desc: 'A Flaming Legend', cost: 3000 },
    { type: 'chest', id: 'sakura', name: 'Sakura Chest', img: '../png/sakura_chest.png', desc: 'Contains Ultra-Rare Kawaii Drops!', cost: 500, isChest: true }
];

async function loadGameFromServer() {
    try {
        const formData = new FormData(); 
        formData.append('action', 'load');
        const res = await fetch('../backend.php', { method: 'POST', body: formData });
        const result = await res.json();
        
        if(result.success && result.data) {
            gameState = {
                coins: parseInt(result.data.coins) || 0,
                gems: parseInt(result.data.gems) || 0,
                playtime: parseInt(result.data.playtime) || 0,
                sakura_coins: parseInt(result.data.sakura_coins) || 0,
                event_tasks: JSON.parse(result.data.event_tasks || '[]'),
                owned_chests: JSON.parse(result.data.owned_chests || '{}'), 
                owned_cursors: JSON.parse(result.data.owned_cursors || '["def"]'),
                equipped_cursor: result.data.equipped_cursor || 'def',
                owned_pets: JSON.parse(result.data.owned_pets || '[]'),
                active_pet: result.data.active_pet || '',
                pet_ages: JSON.parse(result.data.pet_ages || '{}')
            };
            updateCurrencies();
            fillTasks(); 
            renderKawaiiShop(); 
        }
    } catch(e) { console.error("Event failed to load state."); }
}

async function saveGameToServer() {
    if(!gameState) return;
    try {
        const formData = new FormData();
        formData.append('action', 'save');
        formData.append('coins', gameState.coins);
        formData.append('gems', gameState.gems);
        formData.append('playtime', gameState.playtime);
        formData.append('sakura_coins', gameState.sakura_coins);
        formData.append('event_tasks', JSON.stringify(gameState.event_tasks));
        formData.append('owned_chests', JSON.stringify(gameState.owned_chests || {})); 
        formData.append('owned_cursors', JSON.stringify(gameState.owned_cursors));
        formData.append('equipped_cursor', gameState.equipped_cursor);
        formData.append('owned_pets', JSON.stringify(gameState.owned_pets));
        formData.append('active_pet', gameState.active_pet);
        formData.append('pet_ages', JSON.stringify(gameState.pet_ages));
        
        await fetch('../backend.php', { method: 'POST', body: formData });
    } catch(e) { console.error("Event failed to save state."); }
}

function updateCurrencies() {
    if(gameState) {
        document.getElementById('sakuraDisplay').innerText = gameState.sakura_coins.toLocaleString();
        document.getElementById('gemDisplay').innerText = gameState.gems.toLocaleString();
    }
}

function exchangeGems() {
    if (!gameState) return;
    if (gameState.gems >= 150) {
        gameState.gems -= 150;
        gameState.sakura_coins += 500;
        updateCurrencies();
        saveGameToServer();
        showToast("🌸 Converted 150 Gems to 500 Sakura Coins!");
    } else {
        alert("Not enough Gems!");
    }
}

// --- DYNAMIC SHOP LOGIC ---
function renderKawaiiShop() {
    if (!gameState) return;
    const grid = document.getElementById('kawaiiShopGrid');
    grid.innerHTML = '';

    KAWAII_SHOP.forEach(item => {
        let cardStyle = item.isChest || item.color ? `border-color: ${item.color || 'var(--p1)'};` : '';
        let imgStyle = item.isChest ? 'filter: drop-shadow(0 0 10px var(--p1));' : '';
        let titleStyle = item.isChest || item.color ? `color: ${item.color || 'var(--p1)'};` : '';
        
        let visual = item.img 
            ? `<img src="${item.img}" alt="${item.name}" style="${imgStyle}">`
            : `<div style="font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px ${item.color});">${item.icon}</div>`;

        let btnHTML = '';
        if (item.isChest) {
            btnHTML = `<button class="btn-buy btn-buy-chest" onclick="buySakuraChest()">Buy for ${item.cost.toLocaleString()} 🌸</button>`;
        } else if (item.type === 'currency') {
            btnHTML = `<button class="btn-buy btn-buy-gems" onclick="buyGems()">Buy for ${item.cost.toLocaleString()} 🌸</button>`;
        } else {
            // Replaced generic Buy btn with duplicate-friendly Buy btn
            btnHTML = `<button class="btn-buy" onclick="buyItem('${item.type}', '${item.id}', ${item.cost}, '${item.name}')">Buy for ${item.cost.toLocaleString()} 🌸</button>`;
        }

        grid.innerHTML += `
            <div class="shop-card" style="${cardStyle}">
                ${visual}
                <h3 style="${titleStyle}">${item.name}</h3>
                <p style="font-size: 12px; color: #aaa;">${item.desc}</p>
                ${btnHTML}
            </div>
        `;
    });
}

async function buyGems() {
    if (gameState.sakura_coins < 500) return alert("Not enough Sakura Coins!");
    
    gameState.sakura_coins -= 500;
    gameState.gems += 100;
    
    updateCurrencies();
    await saveGameToServer();
    
    document.getElementById('rewardIcon').innerText = '💎';
    document.getElementById('rewardDesc').innerHTML = `You successfully bought <br><span style="color: #00ffcc; font-size: 24px;">100 Gems</span>!`;
    document.getElementById('rewardPopup').style.display = 'flex';
}

async function buyItem(type, baseId, cost, name) {
    if (gameState.sakura_coins < cost) return alert("Not enough Sakura Coins!");
    
    if (type === 'cursor') {
        if (gameState.owned_cursors.length >= MAX_CURSORS) return alert(`❌ Cursor Inventory Full! (${MAX_CURSORS}/${MAX_CURSORS})`);
        gameState.sakura_coins -= cost;
        gameState.owned_cursors.push(baseId);
    } else if (type === 'pet') {
        if (gameState.owned_pets.length >= MAX_PETS) return alert(`❌ Pet Inventory Full! (${MAX_PETS}/${MAX_PETS})`);
        gameState.sakura_coins -= cost;
        let uid = baseId + '::' + Date.now();
        gameState.owned_pets.push(uid);
        gameState.pet_ages[uid] = 0;
    }

    updateCurrencies();
    await saveGameToServer();
    
    document.getElementById('rewardIcon').innerText = type === 'pet' ? '🐾' : '🎀';
    document.getElementById('rewardDesc').innerHTML = `You successfully bought the <br><span style="color: var(--p1); font-size: 24px;">${name}</span>!`;
    document.getElementById('rewardPopup').style.display = 'flex';
}

async function buySakuraChest() {
    if (gameState.sakura_coins < 500) return alert("Not enough Sakura Coins to buy the chest!");

    gameState.sakura_coins -= 500;
    
    if (!gameState.owned_chests) gameState.owned_chests = {};
    gameState.owned_chests['sakura'] = (gameState.owned_chests['sakura'] || 0) + 1;

    updateCurrencies();
    await saveGameToServer();

    document.getElementById('rewardIcon').innerText = '📦';
    document.getElementById('rewardDesc').innerHTML = `
        You successfully bought the <br><span style="color: var(--p1); font-size: 24px;">Sakura Chest</span>!<br><br>
        <span style="color: #aaa; font-size: 14px;">(It has been sent to your Vault to open!)</span>
    `;
    document.getElementById('rewardPopup').style.display = 'flex';
}

// --- DYNAMIC TASKS LOGIC ---
function fillTasks() {
    if (!gameState) return;
    
    let changed = false;
    while (gameState.event_tasks.length < 4) {
        let randomGame = GAME_POOL[Math.floor(Math.random() * GAME_POOL.length)];
        let newTask = {
            id: Date.now() + Math.random(),
            type: 'play_specific',
            game: randomGame,
            name: `Play ${randomGame} (5 mins)`,
            current: 0,
            goal: 300, 
            points: 2,
            completed: false
        };
        gameState.event_tasks.push(newTask);
        changed = true;
    }
    
    if (changed) saveGameToServer();
    renderTasks();
}

function renderTasks() {
    if (!gameState) return;
    const container = document.getElementById('taskList');
    let pointsToShake = 0;
    
    container.innerHTML = "";
    gameState.event_tasks.forEach(t => {
        if (t.completed) pointsToShake += t.points;
        
        let percent = Math.min(100, (t.current / t.goal) * 100);
        let currentMins = Math.floor(t.current / 60);
        let statusText = t.completed ? 'READY TO CLAIM! ✓' : `${currentMins}m / 5m`;

        const card = document.createElement('div');
        card.className = `task-card ${t.completed ? 'done' : ''}`;
        card.innerHTML = `
            <div class="task-title">
                <span>${t.name}</span>
                <span class="task-pts">+${t.points} Pt</span>
            </div>
            <div style="font-size: 0.9rem; color: #aaa;">Status: <strong style="color: #fff;">${statusText}</strong></div>
            <div class="progress-bg">
                <div class="progress-fill" style="width: ${percent}%"></div>
            </div>
        `;
        container.appendChild(card);
    });
    
    document.getElementById('pointsDisplay').innerText = `Ready to Shake: ${pointsToShake}`;
}

let isShaking = false;
async function shakeTree() {
    if(isShaking || !gameState) return;
    
    let claimableTasks = gameState.event_tasks.filter(t => t.completed);
    if (claimableTasks.length === 0) return showToast("Complete tasks to get points!");

    isShaking = true;
    const img = document.getElementById('treeImg');
    img.classList.add('shaking');
    
    setTimeout(async () => {
        img.classList.remove('shaking');
        
        let totalCoinsWon = 0;
        let totalPointsRedeemed = 0;

        claimableTasks.forEach(task => {
            for (let i = 0; i < task.points; i++) {
                totalPointsRedeemed++;
                totalCoinsWon += 100;
            }
        });

        gameState.sakura_coins += totalCoinsWon;
        gameState.event_tasks = gameState.event_tasks.filter(t => !t.completed);
        
        fillTasks(); 
        updateCurrencies();

        document.getElementById('rewardIcon').innerText = '🌸';
        document.getElementById('rewardDesc').innerHTML = `
            <span style="color: #ffd700;">Redeemed ${totalPointsRedeemed} Points!</span><br><br>
            <span style="color: var(--p1); font-size: 22px;">+${totalCoinsWon} Sakura Coins</span>
        `;
        document.getElementById('rewardPopup').style.display = 'flex';
        
        isShaking = false;
    }, 600);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

setInterval(() => {
    loadGameFromServer();
}, 5000);

loadGameFromServer();
</script>
</body>
</html>
