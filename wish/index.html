<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish - Gamer Cards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000814;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- BACK BUTTON --- */
        .btn-back {
            position: absolute; top: 20px; left: 20px;
            background: transparent; border: 2px solid #00f5d4; color: #00f5d4;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s; text-decoration: none; z-index: 100;
        }
        .btn-back:hover { background: #00f5d4; color: #000; box-shadow: 0 0 15px rgba(0, 245, 212, 0.5); }

        /* ========================================= */
        /* --- GACHA BANNER SHOWCASE UI --- */
        /* ========================================= */
        .stats { 
            font-size: 24px; font-weight: bold; margin-bottom: 20px; 
            color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); 
            z-index: 100; position: relative;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
            border: 2px solid #444;
        }
        
        /* BANNER TABS */
        .banner-tabs {
            display: flex; gap: 15px; margin-bottom: -2px; z-index: 10; position: relative;
        }
        .banner-tab-btn {
            background: rgba(0,0,0,0.8); border: 2px solid #00f5d4; color: #fff;
            padding: 12px 30px; border-radius: 20px 20px 0 0; font-weight: bold; font-size: 18px;
            cursor: pointer; transition: 0.3s; opacity: 0.5; border-bottom: none;
        }
        .banner-tab-btn.active {
            background: rgba(0, 245, 212, 0.15); opacity: 1; text-shadow: 0 0 10px #00f5d4;
            padding-bottom: 18px; margin-top: -6px; border-width: 3px;
        }

        .banner-container {
            position: relative;
            width: 95%; max-width: 900px; height: 500px;
            border-radius: 20px; overflow: hidden;
            border: 4px solid #00f5d4;
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 40px; box-sizing: border-box;
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .banner-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.6; transition: opacity 0.4s;
        }

        .banner-title {
            position: absolute; top: 20px; z-index: 2;
            font-size: 32px; font-weight: 900; color: #fff;
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 15px #00f5d4, 0 0 30px #00f5d4;
            transition: text-shadow 0.4s;
        }

        .showcase {
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 30px;
        }

        .showcase-item {
            background: rgba(0, 0, 0, 0.7); border: 3px solid; border-radius: 20px;
            backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; animation: float 4s ease-in-out infinite;
        }
        
        .showcase-item img {
            width: 80%; height: 80%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .showcase-item.epic {
            border-color: #9b59b6; box-shadow: 0 0 20px rgba(155, 89, 182, 0.6);
            width: 120px; height: 120px;
        }
        .showcase-item.legendary {
            border-color: #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.8);
            width: 160px; height: 160px; transform: translateY(-30px); z-index: 3;
            animation: floatLegendary 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes floatLegendary { 0%, 100% { transform: translateY(-30px); } 50% { transform: translateY(-45px); } }

        /* MULTI-BUTTON CONTAINER */
        .wish-buttons {
            position: relative; z-index: 2;
            display: flex; gap: 20px; align-items: center;
        }

        .btn-wish {
            background: linear-gradient(135deg, #00f5d4, #0077b6); border: 2px solid #fff;
            color: white; font-size: 18px; font-weight: 900; padding: 15px 30px;
            border-radius: 40px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(0, 245, 212, 0.6);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-wish.multi {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6);
        }
        .btn-wish:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 255, 255, 0.6); }

        /* ========================================= */
        /* --- WISH ANIMATION (GACHA) STYLES --- */
        /* ========================================= */
        #wishOverlay {
            position: fixed; inset: 0; background: #000411; z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        #wishOverlay.open { display: flex; }

        .space-background {
            position: absolute; inset: 0; z-index: 1;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff 100%, transparent),
                radial-gradient(2px 2px at 20% 30%, #fff 100%, transparent),
                radial-gradient(1px 1px at 40% 70%, #fff 100%, transparent),
                radial-gradient(2px 2px at 60% 20%, #fff 100%, transparent),
                radial-gradient(1px 1px at 80% 80%, #fff 100%, transparent),
                radial-gradient(2px 2px at 90% 40%, #fff 100%, transparent);
            background-size: 200px 200px;
            animation: driftSpace 60s linear infinite;
        }

        @keyframes driftSpace { from { transform: translateY(0); } to { transform: translateY(-200px); } }

        .shooting-star {
            position: absolute; top: -10vw; left: -10vw; 
            width: 15px; height: 15px; border-radius: 50%; 
            z-index: 3; opacity: 0; pointer-events: none;
            transform: rotate(45deg); 
        }
        .shooting-star::after {
            content: ''; position: absolute; top: 50%; transform: translateY(-50%); right: 6px;
            width: 400px; height: 5px; 
            background: linear-gradient(to left, rgba(255,255,255,0), currentColor);
        }

        .wish-flash {
            position: absolute; inset: 0; background: #fff; z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out;
        }

        .wish-result-container {
            z-index: 10; display: none; flex-direction: column; align-items: center; text-align: center;
            transform: scale(0.5); opacity: 0; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
        }
        .wish-result-container.show { display: flex; transform: scale(1); opacity: 1; }

        .wish-row {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            max-width: 95vw; max-height: 70vh; overflow-y: auto; padding: 20px;
        }

        .wish-card {
            padding: 20px; border-radius: 15px; border: 3px solid; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; width: 130px; 
        }
        
        .wish-row.single .wish-card { padding: 40px; width: 250px; border-width: 4px; margin-bottom: 25px; }
        .wish-card img { width: 70px; height: 70px; object-fit: contain; }
        .wish-row.single .wish-card img { width: 150px; height: 150px; margin-bottom: 15px; }

        .wish-card h3 { font-size: 12px; letter-spacing: 2px; margin: 0 0 10px 0; }
        .wish-row.single .wish-card h3 { font-size: 18px; margin-bottom: 15px; }

        .wish-card h2 { font-size: 14px; margin: 10px 0; text-align: center; line-height: 1.2;}
        .wish-row.single .wish-card h2 { font-size: 28px; }

        .dup-badge { color:#ff4444; font-size:11px; font-weight:bold; background: rgba(255,0,0,0.2); padding: 5px; border-radius: 6px; text-align: center; width: 100%; box-sizing: border-box;}
        .wish-row.single .dup-badge { font-size: 14px; padding: 8px; }

        .btn-confirm {
            width: 250px; background: #fff; color: #000; font-size: 20px; font-weight: bold;
            padding: 15px; border: none; border-radius: 30px; cursor: pointer; transition: 0.2s;
            margin-top: 10px;
        }
        .btn-confirm:hover { background: #ddd; transform: scale(1.05); }
    </style>
</head>
<body>

    <a href="../index.html" class="btn-back">⬅ Back to Portal</a>

    <!-- TABS AT THE TOP -->
    <div class="banner-tabs">
        <button id="tab-standard" class="banner-tab-btn active" onclick="switchBanner('standard')">Cosmic Gear</button>
        <button id="tab-meteor" class="banner-tab-btn" onclick="switchBanner('meteor')">Meteor Strike</button>
    </div>

    <!-- ITEM CURRENCY STATS -->
    <div class="stats">
        <span style="color: #00f5d4;">🔮 <span id="stoneDisplay">0</span> Wish Stones</span> 
        <span style="color: #777; margin: 0 10px;">|</span> 
        <span style="color: #ff3377;">☄️ <span id="meteorDisplay">0</span> Wish Meteors</span>
    </div>

    <!-- ========================================= -->
    <!-- GACHA BANNER SHOWCASE UI -->
    <!-- ========================================= -->
    <div class="banner-container" id="bannerContainer">
        <img class="banner-bg" id="bannerBg" src="../png/wish_bg.png" alt="" onerror="this.style.display='none'">
        
        <div class="banner-title" id="bannerTitle">Cosmic Gamer Gear</div>
        
        <!-- SHOWCASE (Updates Dynamically) -->
        <div class="showcase" id="bannerShowcase">
            <!-- Injected by JavaScript -->
        </div>

        <div class="wish-buttons">
            <button class="btn-wish" id="btnWish1" onclick="performWish(1)">✨ Wish x1</button>
            <button class="btn-wish multi" id="btnWish10" onclick="performWish(10)">🌟 Wish x10</button>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- WISH ANIMATION OVERLAY -->
    <!-- ========================================= -->
    <div class="overlay" id="wishOverlay">
        <div class="space-background"></div>
        <div class="shooting-star" id="shootingStar"></div>
        <div class="wish-flash" id="wishFlash"></div>
        
        <div class="wish-result-container" id="wishResult">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <script>
        // =========================================
        // --- DATABASE & STATE SCRIPT ---
        // =========================================
        let isLoggedIn = false;
        let gameState = null;

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('schoolExamsSavedUser');
            if (savedUser) {
                isLoggedIn = true;
                loadGameFromServer(savedUser);
            } else {
                alert("Please log in from the Main Portal first!");
            }
        });

        async function loadGameFromServer(username) {
            const formData = new FormData(); 
            formData.append('action', 'load');
            formData.append('username', username);

            try {
                const response = await fetch('../backend.php', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (result.success && result.data) {
                    gameState = {
                        coins: parseInt(result.data.coins) || 0,
                        gems: parseInt(result.data.gems) || 0,
                        playtime: parseInt(result.data.playtime) || 0,
                        sakura_coins: parseInt(result.data.sakura_coins) || 0,
                        event_tasks: result.data.event_tasks || '[]',
                        owned_cursors: result.data.owned_cursors || '["def"]',
                        equipped_cursor: result.data.equipped_cursor || 'def',
                        owned_pets: result.data.owned_pets || '[]',
                        active_pet: result.data.active_pet || '',
                        pet_ages: result.data.pet_ages || '{}',
                        prestige_level: parseInt(result.data.prestige_level) || 0,
                        profile_pic: result.data.profile_pic || '',
                        owned_items: JSON.parse(result.data.owned_items || '[]'), // Parses Items Array!
                        boost_end: parseInt(result.data.boost_end) || 0,
                        boost_cd: parseInt(result.data.boost_cd) || 0,
                        game_stats: result.data.game_stats || '{}',
                        equipped_gamer_card: result.data.equipped_gamer_card || '',
                        owned_gamer_cards: JSON.parse(result.data.owned_gamer_cards || '[]')
                    };
                    
                    updateStatsUI();
                    switchBanner('standard'); // Boot up banner
                }
            } catch (e) {
                console.error("Error loading game data:", e);
            }
        }

        async function saveGameToServer() {
            if (!isLoggedIn || !gameState) return;
            const formData = new FormData();
            formData.append('action', 'save');
            formData.append('username', localStorage.getItem('schoolExamsSavedUser'));

            // Values we modify in the Wish System
            formData.append('coins', gameState.coins);
            formData.append('owned_items', JSON.stringify(gameState.owned_items));
            formData.append('owned_gamer_cards', JSON.stringify(gameState.owned_gamer_cards));
            
            // Unchanged values mapped back safely
            formData.append('gems', gameState.gems);
            formData.append('playtime', gameState.playtime);
            formData.append('sakura_coins', gameState.sakura_coins);
            formData.append('event_tasks', gameState.event_tasks);
            formData.append('owned_cursors', gameState.owned_cursors);
            formData.append('equipped_cursor', gameState.equipped_cursor);
            formData.append('owned_pets', gameState.owned_pets);
            formData.append('active_pet', gameState.active_pet);
            formData.append('pet_ages', gameState.pet_ages);
            formData.append('prestige_level', gameState.prestige_level);
            formData.append('profile_pic', gameState.profile_pic);
            formData.append('boost_end', gameState.boost_end);
            formData.append('boost_cd', gameState.boost_cd);
            formData.append('game_stats', gameState.game_stats);
            formData.append('equipped_gamer_card', gameState.equipped_gamer_card);

            try { await fetch('../backend.php', { method: 'POST', body: formData }); } 
            catch(e) { console.error("Save error:", e); }
        }

        function updateStatsUI() {
            if(gameState) {
                // Count specific items in inventory array
                const stones = gameState.owned_items.filter(i => i === "Wish Stone").length;
                const meteors = gameState.owned_items.filter(i => i === "Wish Meteor").length;
                
                document.getElementById('stoneDisplay').innerText = stones.toLocaleString();
                document.getElementById('meteorDisplay').innerText = meteors.toLocaleString();
            }
        }

        // =========================================
        // --- WISH SYSTEM SCRIPT ---
        // =========================================

        // 1. CARDS CONFIGURATION (Combines both pools)
        const GAMER_CARDS = [
            // Standard Pool
            { id: "raging_noob", name: "Raging Noob", icon: "<img src='../png/raging_noob.png'>", color: "#aaa" },
            { id: "good_morning", name: "Good Morning!", icon: "<img src='../png/good_morning.png'>", color: "#aaa" },
            { id: "power_of_care", name: "Power Of Care", icon: "<img src='../png/power_of_care.png'>", color: "#aaa" },
            { id: "dog_trainer", name: "Dog Trainer", icon: "<img src='../png/dog_trainer.png'>", color: "#9b59b6" },
            { id: "speedrunner", name: "Speedrunner", icon: "<img src='../png/speedrunner.png'>", color: "#9b59b6" },
            { id: "investor", name: "Investor", icon: "<img src='../png/investor.png'>", color: "#9b59b6" },
            { id: "royal_knight", name: "Royal Knight", icon: "<img src='../png/royal_knight.png'>", color: "#f1c40f" },
            { id: "evolution_scientist", name: "Evolution Scientist", icon: "<img src='../png/evolution_scientist.png'>", color: "#f1c40f" },
            
            // New Meteor Pool
            { id: "space_police", name: "Space Police", icon: "<img src='../png/space_police.png'>", color: "#9b59b6" },
            { id: "2d_city", name: "2D City", icon: "<img src='../png/2d_city.png'>", color: "#9b59b6" },
            { id: "digital_arcader", name: "Digital Arcader", icon: "<img src='../png/digital_arcader.png'>", color: "#f1c40f" }
        ];

        // 2. BANNER CONFIGURATION
        const BANNERS = {
            standard: {
                id: "standard",
                name: "Standard Banner",
                currency: "Wish Stone",
                icon: "🔮",
                themeColor: "#00f5d4",
                bg: "../png/wish_bg.png",
                showcase: [
                    { id: "dog_trainer", type: "epic", delay: "0.2s" },
                    { id: "royal_knight", type: "legendary", delay: "0s" },
                    { id: "speedrunner", type: "epic", delay: "0.6s" }
                ],
                pools: {
                    rare: ["raging_noob", "good_morning", "power_of_care"],
                    epic: ["dog_trainer", "speedrunner", "investor"],
                    legendary: ["royal_knight", "evolution_scientist"]
                }
            },
            meteor: {
                id: "meteor",
                name: "Limited Banner",
                currency: "Wish Meteor",
                icon: "☄️",
                themeColor: "#ff3377",
                bg: "../png/wish_bg.png", // Make sure you have this image, or it falls back
                showcase: [
                    { id: "space_police", type: "epic", delay: "0.2s" },
                    { id: "digital_arcader", type: "legendary", delay: "0s" },
                    { id: "2d_city", type: "epic", delay: "0.6s" }
                ],
                pools: {
                    rare: ["raging_noob", "good_morning", "power_of_care"], // Shares rare cards
                    epic: ["space_police", "2d_city"],
                    legendary: ["digital_arcader"]
                }
            }
        };

        let activeBanner = "standard";

        const RARITY_COLORS = { rare: "#3498db", epic: "#9b59b6", legendary: "#f1c40f" };
        const RARITY_WEIGHT = { rare: 1, epic: 2, legendary: 3 }; 

        // --- SWITCH BANNER UI ---
        function switchBanner(id) {
            activeBanner = id;
            const banner = BANNERS[id];

            // Tabs
            document.querySelectorAll('.banner-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');

            // Theming
            document.getElementById('bannerContainer').style.borderColor = banner.themeColor;
            document.getElementById('bannerContainer').style.boxShadow = `0 0 40px ${banner.themeColor}40`;
            
            document.getElementById('bannerTitle').innerText = banner.name;
            document.getElementById('bannerTitle').style.textShadow = `0 0 15px ${banner.themeColor}, 0 0 30px ${banner.themeColor}`;
            document.getElementById('bannerBg').src = banner.bg;

            // Buttons
            document.getElementById('btnWish1').innerHTML = `✨ Wish x1 (1 ${banner.icon})`;
            document.getElementById('btnWish10').innerHTML = `🌟 Wish x10 (10 ${banner.icon})`;

            // Generate Showcase
            const showcaseDiv = document.getElementById('bannerShowcase');
            showcaseDiv.innerHTML = banner.showcase.map(s => {
                const card = GAMER_CARDS.find(c => c.id === s.id);
                // Extract image source securely
                let rawIconSrc = card.icon.match(/src='([^']+)'/);
                let imagePath = rawIconSrc ? rawIconSrc[1] : '';
                let imgHtml = imagePath ? `<img src="${imagePath}" onerror="this.outerHTML='<span style=\\'font-size:40px\\'>🎮</span>'">` : `<span style='font-size:40px'>🎮</span>`;
                
                return `<div class="showcase-item ${s.type}" style="animation-delay: ${s.delay};">${imgHtml}</div>`;
            }).join('');
        }

        // 3. MAIN WISH FUNCTION (TURBO MODE)
        async function performWish(count = 1) { 
            if (!isLoggedIn) return alert("❌ Please log in to make a wish!");
            
            // --- FORCE SYNC WITH DATABASE BEFORE ROLLING ---
            const savedUser = localStorage.getItem('schoolExamsSavedUser');
            await loadGameFromServer(savedUser);
            if (!gameState) return;

            const banner = BANNERS[activeBanner];
            const currencyItem = banner.currency;
            
            // Count how many of this item the player owns
            const ownedCount = gameState.owned_items.filter(i => i === currencyItem).length;

            if (ownedCount < count) {
                return alert(`❌ Not enough items! You need ${count}x ${currencyItem} to roll on this banner.`);
            }

            // Deduct Cost (Remove exactly 'count' instances of the item)
            for (let i = 0; i < count; i++) {
                const index = gameState.owned_items.indexOf(currencyItem);
                if (index > -1) gameState.owned_items.splice(index, 1);
            }
            
            updateStatsUI();
            await saveGameToServer(); // Immediately save charge

            document.getElementById('wishFlash').style.opacity = '0';
            document.getElementById('wishResult').classList.remove('show');
            document.getElementById('wishOverlay').classList.add('open');

            const star = document.getElementById('shootingStar');

            // Roll the Dice 'count' times against ACTIVE BANNER POOLS
            let results = [];
            let highestRarity = 'rare';

            for (let i = 0; i < count; i++) {
                let roll = Math.random();
                let rarity = 'rare';
                let cardPool = banner.pools.rare;

                // 89% Rare, 10% Epic, 1% Legendary
                if (roll > 0.89 && roll <= 0.99) { 
                    rarity = 'epic'; cardPool = banner.pools.epic; 
                } else if (roll > 0.99) { 
                    rarity = 'legendary'; cardPool = banner.pools.legendary; 
                }

                if (RARITY_WEIGHT[rarity] > RARITY_WEIGHT[highestRarity]) {
                    highestRarity = rarity;
                }

                let cardId = cardPool[Math.floor(Math.random() * cardPool.length)];
                results.push({ id: cardId, rarity: rarity });
            }

            // --- TURBO ANIMATION SEQUENCE ---
            star.style.transition = 'none';
            star.style.left = '-15vw';
            star.style.top = '-15vw';
            star.style.opacity = '1';
            
            star.style.background = '#e0f7fa';
            star.style.color = '#e0f7fa';
            star.style.boxShadow = '0 0 25px 12px #00f5d4';

            setTimeout(() => {
                // Fly across screen FAST (1s)
                star.style.transition = 'top 1s cubic-bezier(.4,0,.2,1), left 1s cubic-bezier(.4,0,.2,1), background 0.4s, box-shadow 0.4s, color 0.4s';
                star.style.left = '70vw';
                star.style.top = '70vw';

                // Change color (400ms)
                setTimeout(() => {
                    let winColor = RARITY_COLORS[highestRarity];
                    star.style.background = winColor;
                    star.style.color = winColor;
                    star.style.boxShadow = `0 0 50px 20px ${winColor}`;
                }, 400);

                // Flash white (900ms)
                setTimeout(() => {
                    document.getElementById('wishFlash').style.opacity = '1';

                    // Reveal Cards (200ms after flash)
                    setTimeout(async () => { 
                        star.style.opacity = '0';
                        document.getElementById('wishFlash').style.opacity = '0';

                        if (!gameState.owned_gamer_cards) gameState.owned_gamer_cards = [];
                        let cardsHTML = '';

                        // Process pulls
                        results.forEach(result => {
                            let cardInfo = GAMER_CARDS.find(c => c.id === result.id);
                            let isDup = gameState.owned_gamer_cards.includes(result.id);
                            let dupText = isDup ? `<div class="dup-badge">Duplicate! (+500 🪙)</div>` : `<div style="height:22px;"></div>`;

                            if (isDup) {
                                gameState.coins += 500;
                            } else {
                                gameState.owned_gamer_cards.push(result.id);
                            }

                            let rawIconSrc = cardInfo.icon.match(/src='([^']+)'/);
                            let imagePath = rawIconSrc ? rawIconSrc[1] : '';
                            let iconHTML = imagePath 
                                ? `<img src="${imagePath}" style="filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));" onerror="this.outerHTML='<span style=\\'font-size:30px;\\'>🎮</span>'">` 
                                : cardInfo.icon;

                            cardsHTML += `
                                <div class="wish-card" style="border-color: ${RARITY_COLORS[result.rarity]}; box-shadow: 0 0 20px ${RARITY_COLORS[result.rarity]}30;">
                                    <h3 style="color: #fff; text-shadow: 0 0 10px ${RARITY_COLORS[result.rarity]};">${result.rarity}</h3>
                                    <div style="display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 20px ${RARITY_COLORS[result.rarity]}); margin-bottom: 10px;">
                                        ${iconHTML}
                                    </div>
                                    <h2 style="color: ${RARITY_COLORS[result.rarity]}; text-shadow: 0 0 8px rgba(0,0,0,0.8);">${cardInfo.name}</h2>
                                    ${dupText}
                                </div>
                            `;
                        });
                        
                        await saveGameToServer(); 
                        updateStatsUI();

                        let resultUI = document.getElementById('wishResult');
                        resultUI.innerHTML = `
                            <div class="wish-row ${count === 1 ? 'single' : ''}">
                                ${cardsHTML}
                            </div>
                            <button class="btn-confirm" onclick="closeWish()">Confirm</button>
                        `;
                        resultUI.classList.add('show');
                    }, 200); 
                }, 900); 
            }, 50); 
        }

        function closeWish() {
            document.getElementById('wishOverlay').classList.remove('open');
        }
    </script>
</body>
</html>
