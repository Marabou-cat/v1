<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Live Trade Room - Digital Portal</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
            --w: #caf0f8; --m: #90e0ef; --d: #48cae4;
            --line: rgba(144, 224, 239, 0.2);
            --glass: rgba(0, 29, 61, 0.85);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --glow-blue: 0 0 20px rgba(144, 224, 239, 0.4);
            --glow-green: 0 0 25px rgba(59, 165, 92, 0.6);
            --glow-red: 0 0 25px rgba(255, 68, 68, 0.6);
            --r: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg0); 
            color: var(--w); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .bg-grid { 
            position: fixed; inset: 0; z-index: -1; 
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); 
            background-size: 40px 40px; 
        }

        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 29, 61, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--p0);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0; color: var(--p1); font-size: 32px;
            letter-spacing: 2px; text-shadow: var(--glow-blue);
        }

        /* --- LOBBY STYLES --- */
        #lobby {
            background: var(--glass); border: 2px solid var(--p0); border-radius: var(--r);
            padding: 40px; width: 90%; max-width: 500px; text-align: center;
            box-shadow: var(--shadow), var(--glow-blue); margin-top: 50px;
        }

        .input-large {
            width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 12px;
            border: 2px solid var(--p2); background: var(--bg0); color: #fff;
            font-size: 20px; text-align: center; outline: none; transition: 0.3s;
            font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
        }

        .input-large:focus { border-color: var(--p1); box-shadow: var(--glow-blue); }

        /* --- BUTTON STYLES --- */
        .btn {
            padding: 18px 30px; border-radius: 12px; font-size: 18px; font-weight: 900;
            border: none; cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-3px); }
        .btn:active { transform: translateY(1px); }

        .btn-blue { background: var(--p0); color: #fff; }
        .btn-blue:hover { background: var(--p1); color: var(--bg0); box-shadow: var(--glow-blue); }
        .btn-green { background: #3ba55c; color: #fff; }
        .btn-green:hover { background: #43b581; box-shadow: var(--glow-green); }
        .btn-danger { background: #d00000; color: #fff; }
        .btn-danger:hover { background: #ff0000; box-shadow: var(--glow-red); }

        /* --- TRADE BOARD STYLES --- */
        .trade-board {
            display: none; justify-content: center; gap: 40px; width: 95%;
            max-width: 1200px; flex-wrap: wrap; padding-bottom: 50px;
        }

        .trade-window {
            flex: 1; min-width: 350px; background: linear-gradient(135deg, var(--bg1), var(--bg2));
            border: 3px solid var(--p2); border-radius: var(--r); padding: 25px;
            display: flex; flex-direction: column; box-shadow: var(--shadow);
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .trade-window.ready { border-color: #3ba55c; box-shadow: 0 0 30px rgba(59, 165, 92, 0.4); }
        .trade-window.ready::after {
            content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 20px rgba(59, 165, 92, 0.5);
            pointer-events: none; border-radius: var(--r);
        }

        .window-header {
            font-size: 24px; font-weight: 900; text-align: center; padding-bottom: 15px;
            margin-bottom: 20px; border-bottom: 2px solid var(--line);
            text-transform: uppercase; letter-spacing: 2px;
        }

        #myHeader { color: var(--p1); text-shadow: var(--glow-blue); }
        #theirHeader { color: #ff4444; text-shadow: var(--glow-red); }
        .trade-window.ready #theirHeader { color: #3ba55c; text-shadow: var(--glow-green); }

        .offer-zone {
            background: rgba(0,0,0,0.4); border: 2px dashed var(--p0); border-radius: 12px;
            min-height: 200px; padding: 15px; margin-bottom: 20px; display: flex;
            flex-direction: column; gap: 10px;
        }

        .item-card {
            background: var(--bg0); border: 2px solid var(--p2); padding: 15px 10px;
            border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: 0.2s; user-select: none;
        }
        .offer-zone .item-card { background: var(--p0); border-color: var(--p1); cursor: pointer; }
        .offer-zone .item-card:hover { background: #d00000; border-color: #ff0000; }
        #theirOfferList .item-card { background: #800000; border-color: #ff4444; cursor: default; }
        #theirOfferList .item-card:hover { background: #800000; border-color: #ff4444; }

        .status-badge {
            background: var(--bg0); padding: 15px; border-radius: 12px; text-align: center;
            font-weight: bold; font-size: 18px; border: 2px solid var(--line); margin-top: auto;
        }

        .section-title { font-size: 14px; color: var(--p1); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }

        .gem-input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .gem-input {
            flex: 1; padding: 12px; border-radius: 8px; border: 2px solid var(--p2);
            background: rgba(0,0,0,0.5); color: #00ffcc; font-size: 16px; font-weight: bold;
            outline: none; text-align: center;
        }
        .gem-input:focus { border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

        /* --- INVENTORY OVERLAY --- */
        .overlay { position: fixed; inset: 0; background: var(--bg0); z-index: 2000; display: none; flex-direction: column; }
        .overlay.open { display: flex; }
        .overlay-bar { height: 60px; background: var(--bg1); display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--p0); justify-content: space-between; }
        .bar-title { font-weight: 900; color: #e67e22; font-size: 16px; letter-spacing: 1px; }
        .btn-close { background: #d00000; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-weight: 900; transition: 0.2s; cursor: pointer;}
        .btn-close:hover { background: #ff0000; box-shadow: 0 0 10px #ff0000; }

        .inv-tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; background: var(--bg0); border-bottom: 2px solid var(--line); }
        .inv-tab-btn { background: var(--bg2); color: var(--w); border: 2px solid var(--p2); padding: 10px 20px; border-radius: 20px; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .inv-tab-btn.active { background: var(--p0); border-color: var(--p1); box-shadow: var(--glow-blue); }

        .shop-container { padding: 30px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .shop-item { background: var(--bg1); border: 2px solid var(--line); border-radius: 16px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.2s; position: relative; }
        .shop-item.added { border-color: #3ba55c; box-shadow: 0 0 15px rgba(59, 165, 92, 0.4); }
        .shop-preview { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        .shop-btn { background: var(--p0); border: none; color: #fff; padding: 8px 15px; border-radius: 10px; font-weight: bold; width: 100%; transition: 0.2s; cursor: pointer; }
        .shop-btn.buy { background: #3ba55c; }
        .shop-btn.buy:hover { background: #43b581; }
        .shop-btn.equipped { background: #d00000; }

        .inventory-badge { position: absolute; top: -10px; right: -10px; background: #ff0055; color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; box-shadow: 0 0 10px #ff0055; border: 2px solid var(--bg1); z-index: 10; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div id="lobby">
        <h2 style="color: var(--p1); margin-top: 0;">Initiate Trade Sequence</h2>
        <button class="btn btn-blue" onclick="createRoom()" style="margin-bottom: 30px;">📡 Host Trade Room</button>
        
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <hr style="flex:1; border-color: var(--line);">
            <span style="color: var(--line); font-weight: bold;">OR</span>
            <hr style="flex:1; border-color: var(--line);">
        </div>

        <input type="text" id="joinCode" class="input-large" placeholder="ENTER ROOM CODE">
        <button class="btn btn-green" onclick="joinRoom()">🔗 Connect to Room</button>
        
        <br><br>
        <button class="btn btn-danger" onclick="window.location.href='../index.html'" style="margin-top: 20px;">Exit to Portal</button>
    </div>

    <div class="trade-board" id="tradeBoard">
        <div class="trade-window" id="myWindow">
            <div class="window-header" id="myHeader">My Transmit</div>
            
            <div class="section-title">Items & Gems Offered</div>
            <div class="offer-zone" id="myOfferList">
                <div style="color: gray; text-align: center; margin-top: 50px;">Select items from inventory...</div>
            </div>
            
            <button class="btn btn-green" onclick="toggleAccept()" id="acceptBtn" style="margin-bottom: 20px;">Ready to Trade</button>
            
            <div class="section-title" style="color: #00ffcc;">Offer Gems (Balance: <span id="myGemBalanceText">0</span> 💎)</div>
            <div class="gem-input-row">
                <input type="number" id="gemOfferInput" class="gem-input" placeholder="Amount..." min="1">
                <button class="btn btn-blue" style="width: auto; padding: 12px 20px; font-size: 14px;" onclick="offerGems()">ADD</button>
            </div>

            <button class="btn btn-blue" style="background: linear-gradient(135deg, #e67e22, #d35400);" onclick="openInventory()">🎒 Select Items to Trade</button>
        </div>

        <div class="trade-window" id="theirWindow">
            <div class="window-header" id="theirHeader">Target Receive</div>
            
            <div class="section-title">Target Offer</div>
            <div class="offer-zone" id="theirOfferList">
                <div style="color: gray; text-align: center; margin-top: 50px;">Awaiting transmission...</div>
            </div>
            
            <div class="status-badge" id="theirStatus">Target Not Ready</div>
        </div>
    </div>

    <div class="overlay" id="inventoryOverlay">
        <div class="overlay-bar">
            <div class="bar-title" style="color: #e67e22;">🎒 Select Items to Trade</div>
            <button class="btn-close" onclick="closeInventory()">CLOSE ✕</button>
        </div>
        <div class="inv-tabs">
            <button class="inv-tab-btn active" id="tabBtnPets" onclick="showInvTab('pets')">🐾 My Pets</button>
            <button class="inv-tab-btn" id="tabBtnCursors" onclick="showInvTab('cursors')">🖱️ My Cursors</button>
            <button class="inv-tab-btn" id="tabBtnItems" onclick="showInvTab('items')">🎒 My Items</button>
        </div>
        
        <div class="shop-container" id="invPetsContainer"></div>
        <div class="shop-container" id="invCursorsContainer" style="display: none;"></div>
        <div class="shop-container" id="invItemsContainer" style="display: none;"></div>
    </div>

<script>
    // --- MASTER DATABASES (Sync with main portal) ---
    const PET_SHOP = [
        { id: "doge", name: "Pixel Doge", icon: "🐕" }, 
        { id: "cat", name: "Cyber Kitty", icon: "🐈" },
        { id: "frog", name: "Ninja Frog", icon: "🐸" }, 
        { id: "mecha_cat", name: "Mecha Cat", icon: "🐱‍👤", color: "#ff00ff" },
        { id: "dragon", name: "Neon Dragon", icon: "🐲" },
        { id: "panda", name: "Ghost Panda", icon: "🐼" }, 
        { id: "kraken", name: "67 Kraken", icon: "🦑" },
        { id: "midas", name: "King Midas", icon: "👑", color: "#ffd700" },
        { id: "phoenix", name: "Mythic Phoenix", icon: "🔥", color: "#ff4400" }, 
        { id: "griffin", name: "Flaming Griffin", icon: "🦅", color: "#ff4400" },
        { id: "aerodactylus", name: "Eruption Aerodactylus", icon: "🦖", color: "#ff4400" }, 
        { id: "gb", name: "Gem Beast", icon: "💎", color: "#add8e6" },
        { id: "hs", name: "Void Hound", icon: "🐺", color: "#add8e6" },
        { id: "gs", name: "Glowing Shadow", icon: "🌑", color: "#add8e6" },
        { id: "lt", name: "Living Treasure", icon: "🪙", color: "#ffce1b" },
        { id: "lva", name: "Living Vault", icon: "🏦", color: "#ffce1b" },
        { id: "kitsune", name: "Sakura Kitsune", icon: "🦊", color: "#ffb7b2" },
        { id: "blossom", name: "Elder Sakura Blossom", icon: "🌸", color: "#ffb7b2" },
        { id: "katanaspirit", name: "Katana Spirit", icon: "⚔️", color: "#ffb7b2" },
        { id: "bn", name: "Blossom Ninetails", icon: "🦊", color: "#ffb7b2" },
        { id: "crystal_dragon", name: "Crystal Dragon", icon: "🐉", color: "#ffb7b2" },
        { id: "seed", name: "Mysterious Seed", icon: "🌱", color: "#ffb7b2" },
        { id: "flytrap", name: "Moonlight Flytrap", icon: "🪴", color: "#ffb7b2" },
        { id: "mboe", name: "Moonlight Beast Of Eclipse", icon: "🦇", color: "#13265c" }
    ];

    const CURSORS = [
        { id: "def", name: "Default Mouse", src: "../png/DefMouse.png" }, 
        { id: "m1", name: "Egg Twins", src: "../png/Twins.png" },
        { id: "m2", name: "Gold Ingot", src: "../png/Goldingot.png" }, 
        { id: "m3", name: "Cheesy Cursor", src: "../png/mouse.png" },
        { id: "m4", name: "Sword Cursor", src: "../png/Katana.png" }, 
        { id: "m5", name: "Pizza Slice", src: "../png/pizza.png" },
        { id: "m6", name: "Sign Of Greed", src: "../png/greed.png" },
        { id: "dragon", name: "Mythic Dragon", src: "../png/Dragon.gif", color: "#ff0000" },
        { id: "bp1", name: "Silver Apple", src: "../png/Apple.png", color: "#9b59b6" },
        { id: "bp2", name: "Robot BOB", src: "../png/Robot.png", color: "#9b59b6" },
        { id: "bp3", name: "Silver Statue", src: "../png/Statue.png", color: "#9b59b6" },
        { id: "bp4", name: "Midas Sword", src: "../png/Midas.png", color: "#ffd700" },
        { id: "bp5", name: "Golden Flame", src: "../png/Flame.png", color: "#ffd700" },
        { id: "bp6", name: "Royal Gleam", src: "../png/Gleam.png", color: "#ffd700" },
        { id: "prism", name: "Prism Wing", src: "../png/Prism.png", color: "#00ffcc" },
        { id: "stick", name: "Stick Of Darkness", src: "../png/darkness.png", color: "#00ffcc" },
        { id: "sakura_ribbon", name: "Sakura Ribbon", src: "../png/ribbon.png", color: "#ffb7b2" },
        { id: "sakura_star", name: "Sakura Star", src: "../png/star.png", color: "#ffb7b2" }
    ];

    // --- STATE VARIABLES ---
    let gameState = null;
    let currentRoom = null;
    let myOffer = [];
    let myGemOffer = 0; 
    let pollInterval = null;
    
    // NEW: Variable to hold the other player's pet ages so we can render them properly
    let theirPetAges = {};

    async function api(action, data = {}) {
        const fd = new FormData();
        fd.append('action', action);
        for (let key in data) fd.append(key, data[key]);
        const res = await fetch('live_trade_backend.php', { method: 'POST', body: fd });
        return await res.json();
    }

    async function createRoom() {
        const res = await api('create_room');
        if (res.success) {
            alert(`Room Created! Give this code to your partner: ${res.room_code}`);
            enterRoom(res.room_code);
        }
    }

    async function joinRoom() {
        const code = document.getElementById('joinCode').value.toUpperCase();
        if(!code) return alert("Please enter a code.");
        const res = await api('join_room', { room_code: code });
        if (res.success) enterRoom(code);
        else alert(res.message);
    }

    async function enterRoom(code) {
        currentRoom = code;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('tradeBoard').style.display = 'flex';
        
        await loadGameFromServer(); 
        pollInterval = setInterval(syncRoom, 1500);
    }

    // --- FETCH REAL INVENTORY FROM MAIN BACKEND ---
    async function loadGameFromServer() {
        const fd = new FormData(); fd.append('action', 'load');
        const res = await fetch('../backend.php', { method: 'POST', body: fd });
        const result = await res.json();
        
        if (result.success && result.data) {
            gameState = {
                gems: parseInt(result.data.gems) || 0,
                owned_cursors: JSON.parse(result.data.owned_cursors || '["def"]'),
                equipped_cursor: result.data.equipped_cursor || 'def',
                owned_pets: JSON.parse(result.data.owned_pets || '[]'),
                active_pet: result.data.active_pet || '',
                pet_ages: JSON.parse(result.data.pet_ages || '{}'),
                owned_items: JSON.parse(result.data.owned_items || '[]') // LOAD ITEMS
            };
            document.getElementById('myGemBalanceText').innerText = gameState.gems.toLocaleString();
        }
    }

    // --- INVENTORY OVERLAY LOGIC ---
    function openInventory() {
        document.getElementById('inventoryOverlay').classList.add('open');
        showInvTab('pets');
    }
    function closeInventory() {
        document.getElementById('inventoryOverlay').classList.remove('open');
    }

    function showInvTab(tabName) {
        document.getElementById('tabBtnPets').classList.remove('active');
        document.getElementById('tabBtnCursors').classList.remove('active');
        document.getElementById('tabBtnItems').classList.remove('active');
        
        document.getElementById('invPetsContainer').style.display = 'none';
        document.getElementById('invCursorsContainer').style.display = 'none';
        document.getElementById('invItemsContainer').style.display = 'none';
        
        if(tabName === 'pets') {
            document.getElementById('tabBtnPets').classList.add('active');
            document.getElementById('invPetsContainer').style.display = 'grid';
        } else if (tabName === 'cursors') {
            document.getElementById('tabBtnCursors').classList.add('active');
            document.getElementById('invCursorsContainer').style.display = 'grid';
        } else if (tabName === 'items') {
            document.getElementById('tabBtnItems').classList.add('active');
            document.getElementById('invItemsContainer').style.display = 'grid';
        }
        renderInventory();
    }

    function renderInventory() {
        if (!gameState) return;
        const petContainer = document.getElementById('invPetsContainer');
        const curContainer = document.getElementById('invCursorsContainer');
        const itemsContainer = document.getElementById('invItemsContainer');
        
        petContainer.innerHTML = ''; curContainer.innerHTML = ''; itemsContainer.innerHTML = '';
        
        let curCounts = {};
        gameState.owned_cursors.forEach(id => curCounts[id] = (curCounts[id] || 0) + 1);
        
        let itemCounts = {};
        gameState.owned_items.forEach(id => itemCounts[id] = (itemCounts[id] || 0) + 1);

        // 1. Pets Tab
        if (gameState.owned_pets.length === 0) {
            petContainer.innerHTML = `<div style="color: gray; grid-column: 1/-1;">You don't own any pets.</div>`;
        } else {
            gameState.owned_pets.forEach(petUid => {
                const baseId = petUid.split('::')[0];
                const pet = PET_SHOP.find(p => p.id === baseId);
                if (pet) {
                    const isEquipped = gameState.active_pet === petUid;
                    const isOffered = myOffer.includes(petUid);
                    const level = Math.floor((gameState.pet_ages[petUid] || 0) / 600) + 1;
                    
                    let btnHTML = '';
                    let cardStyle = pet.color ? `border-color:${pet.color};` : '';

                    if (isEquipped) {
                        btnHTML = `<button class="shop-btn" disabled style="background: #555;">Equipped (Locked)</button>`;
                    } else if (isOffered) {
                        cardStyle = `border-color: #3ba55c; box-shadow: 0 0 15px rgba(59, 165, 92, 0.4);`;
                        btnHTML = `<button class="shop-btn equipped" onclick="removeFromOffer('${petUid}')">Remove from Offer</button>`;
                    } else {
                        btnHTML = `<button class="shop-btn buy" onclick="addToOffer('${petUid}')">Add to Offer</button>`;
                    }
                        
                    petContainer.innerHTML += `
                        <div class="shop-item" style="position:relative; ${cardStyle}">
                            <div style="font-size: 50px; margin-bottom: 10px;">${pet.icon}</div>
                            <h3>${pet.name}</h3>
                            <p style="font-size: 11px; color: var(--p1); margin-bottom: 10px;">Level ${level}</p>
                            ${btnHTML}
                        </div>
                    `;
                }
            });
        }

        // 2. Cursors Tab
        CURSORS.forEach(item => {
            if (curCounts[item.id]) {
                const count = curCounts[item.id];
                const isEquipped = gameState.equipped_cursor === item.id;
                const offeredCount = myOffer.filter(x => x === item.id).length;
                const availableToTrade = count - (isEquipped ? 1 : 0);
                
                let btnHTML = '';
                let cardStyle = item.color ? `border-color:${item.color};` : '';

                if (availableToTrade <= 0) {
                    btnHTML = `<button class="shop-btn" disabled style="background: #555;">Equipped (Locked)</button>`;
                } else {
                    if (offeredCount > 0) cardStyle = `border-color: #3ba55c; box-shadow: 0 0 15px rgba(59, 165, 92, 0.4);`;
                    
                    if (offeredCount >= availableToTrade) {
                        btnHTML = `<button class="shop-btn equipped" disabled style="background: #e74c3c;">Max Offered (${offeredCount})</button>`;
                    } else {
                        btnHTML = `<button class="shop-btn buy" onclick="addToOffer('${item.id}')">Add to Offer (${offeredCount}/${availableToTrade})</button>`;
                    }
                }
                    
                curContainer.innerHTML += `
                    <div class="shop-item" style="position:relative; ${cardStyle}">
                        <div class="inventory-badge">x${count}</div>
                        <img src="${item.src}" class="shop-preview">
                        <h3>${item.name}</h3>
                        ${btnHTML}
                    </div>
                `;
            }
        });
        
        // 3. Items Tab (Moonstones, etc)
        if (gameState.owned_items.length === 0) {
            itemsContainer.innerHTML = `<div style="color: gray; grid-column: 1/-1;">You don't own any items.</div>`;
        } else {
            Object.keys(itemCounts).forEach(itemName => {
                const count = itemCounts[itemName];
                const itemID = `item::${itemName}`; // We prefix items to distinguish them from cursors in the offer array
                const offeredCount = myOffer.filter(x => x === itemID).length;
                const availableToTrade = count;
                
                let btnHTML = '';
                let cardStyle = '';
                let icon = '📦';
                
                if (itemName === 'Moonstone') {
                    icon = '🌑';
                    cardStyle = 'border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);';
                }

                if (offeredCount > 0) cardStyle = `border-color: #3ba55c; box-shadow: 0 0 15px rgba(59, 165, 92, 0.4);`;
                
                if (offeredCount >= availableToTrade) {
                    btnHTML = `<button class="shop-btn equipped" disabled style="background: #e74c3c;">Max Offered (${offeredCount})</button>`;
                } else {
                    btnHTML = `<button class="shop-btn buy" onclick="addToOffer('${itemID}')">Add to Offer (${offeredCount}/${availableToTrade})</button>`;
                }
                    
                itemsContainer.innerHTML += `
                    <div class="shop-item" style="position:relative; ${cardStyle}">
                        <div class="inventory-badge">x${count}</div>
                        <div style="font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #00ffcc);">${icon}</div>
                        <h3 style="color: #00ffcc;">${itemName}</h3>
                        ${btnHTML}
                    </div>
                `;
            });
        }
    }

    // --- MAIN API WRAPPER FOR OFFER UPDATES ---
    // This dynamically packages the pet ages of ONLY the pets you are offering
    // and sends it to the backend so the other player can fetch it and see the levels.
    async function pushOfferUpdate() {
        let myOfferedPetAges = {};
        
        myOffer.forEach(id => {
            // Check if it's a pet (has :: but is not an item)
            if (id.includes('::') && !id.startsWith('item::') && gameState.pet_ages[id] !== undefined) {
                myOfferedPetAges[id] = gameState.pet_ages[id];
            }
        });
        
        await api('update_offer', { 
            room_code: currentRoom, 
            offer: JSON.stringify(myOffer), 
            gems: myGemOffer,
            pet_ages: JSON.stringify(myOfferedPetAges) // Send the ages with the offer!
        });
    }

    // --- OFFERING LOGIC ---
    async function offerGems() {
        const inputField = document.getElementById('gemOfferInput');
        const amount = parseInt(inputField.value);
        
        if (isNaN(amount) || amount <= 0) return alert("Please enter a valid amount greater than 0.");
        if (amount > gameState.gems) return alert("You don't have enough gems!");

        myGemOffer = amount;
        inputField.value = ''; 
        
        renderMyOffer();
        await pushOfferUpdate();
    }

    async function removeGemsFromOffer() {
        myGemOffer = 0;
        renderMyOffer();
        await pushOfferUpdate();
    }

    async function addToOffer(id) {
        myOffer.push(id);
        renderMyOffer();
        renderInventory(); 
        await pushOfferUpdate();
    }

    async function removeFromOffer(id) {
        const index = myOffer.indexOf(id);
        if (index > -1) {
            myOffer.splice(index, 1);
            renderMyOffer();
            renderInventory(); 
            await pushOfferUpdate();
        }
    }

    function getItemData(id) {
        if (id.startsWith('item::')) {
            const itemName = id.split('::')[1];
            return { name: `📦 ${itemName}`, isItem: true };
        } else if (id.includes('::')) {
            const baseId = id.split('::')[0];
            const pet = PET_SHOP.find(p => p.id === baseId);
            
            // Look up age based on whether it's OUR pet or THEIR pet
            let age = 0;
            if (gameState.pet_ages[id] !== undefined) {
                age = gameState.pet_ages[id]; // Our pet
            } else if (theirPetAges[id] !== undefined) {
                age = theirPetAges[id]; // Their pet (fetched from sync payload)
            }
            
            let level = Math.floor(age / 600) + 1;
            return { name: `🐾 ${pet?.name || 'Unknown Pet'} <span style="color:#ffb7b2">(Lvl ${level})</span>`, isPet: true };
        } else {
            const cur = CURSORS.find(c => c.id === id);
            return { name: `🖱️ ${cur?.name || 'Unknown Cursor'}`, isPet: false };
        }
    }

    function renderMyOffer() {
        const list = document.getElementById('myOfferList');
        let html = '';

        if (myGemOffer > 0) {
            html += `<div class="item-card" style="background: rgba(0, 255, 204, 0.1); border-color: #00ffcc; color: #00ffcc;" onclick="removeGemsFromOffer()" title="Click to remove">❌ 💎 ${myGemOffer.toLocaleString()} Gems</div>`;
        }

        html += myOffer.map(id => {
            let data = getItemData(id);
            return `<div class="item-card" onclick="removeFromOffer('${id}')" title="Click to remove">❌ ${data.name}</div>`;
        }).join('');

        if (html === '') {
            list.innerHTML = '<div style="color: gray; text-align: center; margin-top: 50px;">Select items from inventory...</div>';
        } else {
            list.innerHTML = html;
        }
    }

    async function toggleAccept() {
        await api('toggle_accept', { room_code: currentRoom });
        syncRoom(); 
    }

    async function syncRoom() {
        const res = await api('sync', { room_code: currentRoom });
        if (!res.success) return;

        if (res.status === 'completed') {
            clearInterval(pollInterval);
            alert("✅ TRADE SEQUENCE COMPLETED SUCCESSFULLY! Items, Pets, & Gems have been swapped. ✅");
            window.location.href = "../"; 
            return;
        }
        
        // Save their pet ages locally so getItemData() can use them to render levels!
        if (res.their_pet_ages) {
            try {
                theirPetAges = JSON.parse(res.their_pet_ages);
            } catch(e) { theirPetAges = {}; }
        }

        const theirList = document.getElementById('theirOfferList');
        let theirHtml = '';
        
        let theirGems = parseInt(res.their_gems) || 0;
        if (theirGems > 0) {
            theirHtml += `<div class="item-card" style="background: rgba(0, 255, 204, 0.1); border-color: #00ffcc; color: #00ffcc;">💎 ${theirGems.toLocaleString()} Gems</div>`;
        }

        theirHtml += res.their_offer.map(id => {
            return `<div class="item-card">${getItemData(id).name}</div>`;
        }).join('');

        if (theirHtml === '') {
            theirList.innerHTML = '<div style="color: gray; text-align: center; margin-top: 50px;">Awaiting transmission...</div>';
        } else {
            theirList.innerHTML = theirHtml;
        }

        const myWin = document.getElementById('myWindow');
        const theirWin = document.getElementById('theirWindow');
        const btn = document.getElementById('acceptBtn');
        const targetStatus = document.getElementById('theirStatus');

        if (res.my_accept) {
            myWin.classList.add('ready');
            btn.className = 'btn btn-danger';
            btn.innerText = 'CANCEL READINESS';
        } else {
            myWin.classList.remove('ready');
            btn.className = 'btn btn-green';
            btn.innerText = 'READY TO TRADE';
        }

        if (res.their_accept) {
            theirWin.classList.add('ready');
            targetStatus.innerText = 'TARGET LOCKED & READY';
            targetStatus.style.borderColor = '#3ba55c';
            targetStatus.style.color = '#3ba55c';
        } else {
            theirWin.classList.remove('ready');
            targetStatus.innerText = 'TARGET NOT READY';
            targetStatus.style.borderColor = 'var(--line)';
            targetStatus.style.color = 'var(--w)';
        }
    }
</script>
