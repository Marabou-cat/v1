<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyCord</title>
    <style>
        :root {
            --bg-tertiary: #1e1f22; /* Server Bar */
            --bg-secondary: #2b2d31; /* Sidebars */
            --bg-primary: #313338; /* Main Chat */
            --bg-message-hover: #2e3035;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --brand: #5865F2; /* Blurple */
            --green: #23a559;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-normal); background: var(--bg-primary); display: flex; overflow: hidden;
        }

        /* --- 1. SERVER BAR --- */
        .server-bar {
            width: 72px; background: var(--bg-tertiary); display: flex; flex-direction: column; align-items: center;
            padding-top: 12px; gap: 8px; overflow-y: auto;
        }
        .server-icon {
            width: 48px; height: 48px; border-radius: 50%; background: var(--bg-primary); 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; color: var(--text-normal);
        }
        .server-icon:hover, .server-icon.active { border-radius: 16px; background: var(--brand); color: #fff; }
        .server-icon.home { background: var(--bg-secondary); }
        .server-icon.add-server { background: var(--bg-primary); color: var(--green); }
        .server-icon.add-server:hover { background: var(--green); color: #fff; }
        .separator { width: 32px; height: 2px; background: var(--bg-secondary); margin: 4px 0; }

        /* --- 2. SIDEBAR --- */
        .sidebar { width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; }
        .sidebar-header { 
            height: 48px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
            font-weight: bold; border-bottom: 1px solid #1f2023; box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
        }
        .sidebar-content { flex: 1; padding: 8px; overflow-y: auto; }
        .list-item { padding: 8px 12px; margin-bottom: 2px; border-radius: 4px; display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-muted); }
        .list-item:hover, .list-item.active { background: #3f4147; color: var(--text-normal); }
        
        .user-panel { height: 52px; background: #232428; display: flex; align-items: center; padding: 0 8px; gap: 10px; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; background: #9b59b6; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; flex-shrink: 0;}

        /* --- 3. MAIN CHAT AREA --- */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { height: 48px; border-bottom: 1px solid #1f2023; display: flex; align-items: center; padding: 0 16px; font-weight: bold; box-shadow: 0 1px 2px rgba(0,0,0,0.2); justify-content: space-between; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; }
        .message { padding: 4px 16px; display: flex; gap: 16px; margin-bottom: 10px;}
        .message:hover { background: var(--bg-message-hover); }
        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-username { font-weight: 500; cursor: pointer; color: #00f5d4; }
        .msg-username:hover { text-decoration: underline; }
        .msg-timestamp { font-size: 12px; color: var(--text-muted); }
        .msg-content { color: var(--text-normal); line-height: 1.4; word-wrap: break-word;}

        .chat-input-wrapper { padding: 0 16px 24px 16px; }
        .chat-input { width: 100%; background: #383a40; border: none; border-radius: 8px; padding: 12px 16px; color: var(--text-normal); font-size: 15px; outline: none; box-sizing: border-box; }
        .chat-input:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- MODALS & POPUPS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal { background: var(--bg-primary); padding: 24px; border-radius: 8px; width: 400px; text-align: center;}
        .modal input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; background: #1e1f22; border: none; color: #fff; border-radius: 4px; box-sizing: border-box; outline: none; }
        .btn { background: var(--brand); color: #fff; border: none; padding: 10px 16px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #4752c4; }
        
        .profile-popup { position: absolute; background: #111214; border-radius: 8px; padding: 16px; width: 250px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); display: none; z-index: 2000; border: 1px solid #333; }
        .btn-add-friend { background: var(--green); margin-top: 10px; }

        .btn-icon { cursor: pointer; color: var(--text-muted); transition: 0.2s; font-size: 18px; user-select: none;}
        .btn-icon:hover { color: #fff; transform: scale(1.1); }
        
        /* Friend UI Styles */
        .friend-category { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin: 15px 0 5px 8px; }
        .btn-accept { background: var(--green); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: auto; }
        .btn-accept:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <!-- 1. Server List -->
    <div class="server-bar" id="serverListBar">
        <div class="server-icon home active" onclick="loadDMs()" title="Home">🏡</div>
        <div class="separator"></div>
        <!-- Servers injected here -->
        <div class="server-icon add-server" onclick="document.getElementById('createServerModal').style.display='flex'" title="Add a Server">+</div>
        <a href="../index.html" class="server-icon" style="background:#da373c; margin-top: auto; margin-bottom: 10px;" title="Exit to Portal">🚪</a>
    </div>

    <!-- 2. Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header" id="sidebarHeader">
            <span>Direct Messages</span>
        </div>
        <div class="sidebar-content" id="channelList">
            <!-- Channels/Friends injected here -->
        </div>
        <div class="user-panel">
            <div class="avatar-small" id="myAvatar">U</div>
            <div style="font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="myName">Guest</div>
        </div>
    </div>

    <!-- 3. Main Chat -->
    <div class="chat-area">
        <div class="chat-header">
            <span id="chatTitle">Welcome to StudyCord</span>
            <input type="text" placeholder="Search users to add..." id="userSearch" style="background:#1e1f22; border:none; padding:4px 8px; color:#fff; border-radius:4px; outline:none;" onkeypress="if(event.key==='Enter') searchUser(this.value)">
        </div>
        
        <div class="messages" id="messageContainer">
            <div style="text-align:center; color:gray; margin-top: 50px;">Select a channel or friend to start chatting!</div>
        </div>

        <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="chatInput" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendMessage()" disabled>
        </div>
    </div>

    <!-- MODALS & POPUPS -->
    <div class="modal-overlay" id="createServerModal" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal">
            <h2>Create a Study Server</h2>
            <input type="text" id="newServerName" placeholder="e.g., Advanced Math Group">
            <button class="btn" onclick="createServer()">Create</button>
        </div>
    </div>

    <div class="modal-overlay" id="createChannelModal" onclick="if(event.target===this) this.style.display='none'">
        <div class="modal">
            <h2>Create Channel</h2>
            <input type="text" id="newChannelName" placeholder="e.g., announcements">
            <div style="text-align: left; margin-bottom: 15px; color: var(--text-muted); font-size: 14px; background: #1e1f22; padding: 10px; border-radius: 8px;">
                <label style="display: block; margin-bottom: 10px; cursor: pointer; color: #fff;">
                    <input type="radio" name="chanPerms" value="0" checked> 💬 Everyone can talk
                </label>
                <label style="display: block; cursor: pointer; color: #fff;">
                    <input type="radio" name="chanPerms" value="1"> 🔒 Announcement (Only creator can talk)
                </label>
            </div>
            <button class="btn" onclick="submitCreateChannel()">Create Channel</button>
        </div>
    </div>

    <div class="profile-popup" id="profilePopup">
        <!-- Injected via JS -->
    </div>

    <script>
        const myUsername = localStorage.getItem('schoolExamsSavedUser');
        if (!myUsername) {
            alert("Please log in from the main portal first!");
            window.location.href = "../index.html";
        }

        document.getElementById('myName').innerText = myUsername;
        document.getElementById('myAvatar').innerText = myUsername.charAt(0).toUpperCase();

        let currentServerId = null;
        let currentServerName = null;
        let currentChannelId = null;
        let currentDmUser = null; // Used for Direct Messages
        
        let lastMessageTime = 0;
        let chatInterval = null;
        let currentFetchId = 0; // CRITICAL: Fixes chat bleed bug
        
        let isFirstBoot = true;

        // --- API HELPER ---
        async function api(action, data = {}) {
            const fd = new FormData();
            fd.append('action', action);
            fd.append('username', myUsername);
            for (let key in data) fd.append(key, data[key]);
            
            try {
                const res = await fetch('../studycord_backend.php', { method: 'POST', body: fd });
                return await res.json();
            } catch(e) { return { success: false }; }
        }

        // --- INITIAL BOOT & LOAD SERVERS ---
        async function loadServers() {
            const res = await api('load_servers');
            if (!res.success) return;

            const serverBar = document.getElementById('serverListBar');
            const homeBtn = serverBar.children[0].outerHTML;
            const sep = serverBar.children[1].outerHTML;
            const addBtn = `<div class="server-icon add-server" onclick="document.getElementById('createServerModal').style.display='flex'" title="Add a Server">+</div>`;
            const exitBtn = `<a href="../index.html" class="server-icon" style="background:#da373c; margin-top: auto; margin-bottom: 10px;" title="Exit to Portal">🚪</a>`;

            let serverHTML = '';
            res.servers.forEach(s => {
                serverHTML += `<div class="server-icon" onclick="loadServer(${s.id}, '${s.name.replace(/'/g, "\\'")}')" title="${s.name}">${s.name.charAt(0).toUpperCase()}</div>`;
            });

            serverBar.innerHTML = homeBtn + sep + serverHTML + addBtn + exitBtn;

            if (isFirstBoot) {
                isFirstBoot = false; 
                let autoServer = res.servers.find(s => s.id == 16);
                if (autoServer) {
                    loadServer(autoServer.id, autoServer.name);
                } else {
                    loadDMs();
                }
            }
        }

        async function createServer() {
            const name = document.getElementById('newServerName').value;
            if(!name) return;
            
            const res = await api('create_server', { server_name: name });
            if (res.success) {
                document.getElementById('createServerModal').style.display = 'none';
                loadServers();
                loadServer(res.server_id, name);
            }
        }

        // --- NAVIGATION & DMs ---
        async function loadDMs() {
            currentServerId = null;
            currentChannelId = null;
            currentDmUser = null;
            
            // Unhighlight servers, highlight Home
            document.querySelectorAll('.server-icon').forEach(icon => icon.classList.remove('active'));
            document.querySelector('.server-icon.home').classList.add('active');

            document.getElementById('sidebarHeader').innerHTML = `<span>Direct Messages</span>`;
            document.getElementById('chatTitle').innerText = "Friends";
            document.getElementById('messageContainer').innerHTML = `<div style="text-align:center; color:gray; margin-top: 50px;">Select a friend to start chatting!</div>`;
            document.getElementById('chatInput').disabled = true;
            document.getElementById('chatInput').placeholder = "Message...";
            clearInterval(chatInterval);

            // Fetch Friends
            const res = await api('load_friends');
            if (res.success) {
                let html = '';
                
                // Pending Requests
                if (res.pending.length > 0) {
                    html += `<div class="friend-category">Pending Requests</div>`;
                    res.pending.forEach(p => {
                        html += `
                            <div class="list-item" style="cursor:default;">
                                <div class="avatar-small" style="background:#e67e22;">${p.charAt(0).toUpperCase()}</div>
                                <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${p}</span>
                                <button class="btn-accept" onclick="acceptFriend('${p}')">Accept</button>
                            </div>
                        `;
                    });
                }

                // Accepted Friends
                html += `<div class="friend-category">Friends - ${res.friends.length}</div>`;
                if (res.friends.length === 0) {
                    html += `<div style="color:gray; padding:10px; font-size:12px;">No friends yet. Search for a username at the top to add them!</div>`;
                } else {
                    res.friends.forEach(f => {
                        html += `
                            <div class="list-item" onclick="openDM('${f.replace(/'/g, "\\'")}')">
                                <div class="avatar-small" style="background:#3ba55c;">${f.charAt(0).toUpperCase()}</div>
                                <span style="overflow:hidden; text-overflow:ellipsis;">${f}</span>
                            </div>
                        `;
                    });
                }
                document.getElementById('channelList').innerHTML = html;
            }
        }

        async function acceptFriend(user) {
            const res = await api('accept_friend', { target: user });
            if (res.success) loadDMs(); // Refresh friend list
        }

        function openDM(friendName) {
            currentChannelId = 0; // 0 indicates DM mode to the backend
            currentDmUser = friendName;
            
            currentFetchId++; // Fix Chat Bleed Bug
            lastMessageTime = 0; 
            
            document.getElementById('chatTitle').innerText = `@ ${friendName}`;
            document.getElementById('messageContainer').innerHTML = ""; 
            
            const input = document.getElementById('chatInput');
            input.disabled = false;
            input.placeholder = `Message @${friendName}`;

            clearInterval(chatInterval);
            fetchMessages(); 
            chatInterval = setInterval(fetchMessages, 3500); 
        }

        // --- SERVER CHANNELS ---
        async function loadServer(id, name) {
            currentServerId = id;
            currentServerName = name;
            
            // Highlight active server
            document.querySelectorAll('.server-icon').forEach(icon => icon.classList.remove('active'));
            event.target.classList.add('active');
            
            const res = await api('load_channels', { server_id: id });
            if(res.success) {
                let addChannelBtn = (res.owner === myUsername) 
                    ? `<span class="btn-icon" title="Create Channel" onclick="document.getElementById('createChannelModal').style.display='flex'">+</span>` 
                    : ``;

                document.getElementById('sidebarHeader').innerHTML = `<span style="font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${name}</span> ${addChannelBtn}`;
                
                let html = '';
                res.channels.forEach(c => {
                    let lockIcon = c.is_readonly == 1 ? '🔒 ' : '# ';
                    html += `<div class="list-item" onclick="joinChannel(${c.id}, '${c.name.replace(/'/g, "\\'")}', ${c.is_readonly}, '${res.owner}')">${lockIcon}${c.name}</div>`;
                });
                document.getElementById('channelList').innerHTML = html;
                
                if (res.channels.length > 0) {
                    joinChannel(res.channels[0].id, res.channels[0].name, res.channels[0].is_readonly, res.owner);
                }
            }
        }

        async function submitCreateChannel() {
            const name = document.getElementById('newChannelName').value;
            const isReadonly = document.querySelector('input[name="chanPerms"]:checked').value;
            
            if(!name || !currentServerId) return;

            const res = await api('create_channel', { server_id: currentServerId, channel_name: name, is_readonly: isReadonly });
            if (res.success) {
                document.getElementById('createChannelModal').style.display = 'none';
                document.getElementById('newChannelName').value = ''; 
                loadServer(currentServerId, currentServerName); 
            } else {
                alert(res.message);
            }
        }

        async function joinChannel(id, name, isReadonly, serverOwner) {
            currentChannelId = id;
            currentDmUser = null; // Clear DM target
            
            currentFetchId++; // Fix Chat Bleed Bug
            lastMessageTime = 0; 
            
            document.getElementById('chatTitle').innerText = (isReadonly == 1 ? '🔒 ' : '# ') + name;
            document.getElementById('messageContainer').innerHTML = ""; 
            
            const input = document.getElementById('chatInput');
            
            if (isReadonly == 1 && serverOwner !== myUsername) {
                input.disabled = true;
                input.placeholder = "You do not have permission to send messages in this channel.";
            } else {
                input.disabled = false;
                input.placeholder = `Message #${name}`;
            }

            clearInterval(chatInterval);
            fetchMessages(); 
            chatInterval = setInterval(fetchMessages, 2000); 
        }

        // --- CHAT SYSTEM ---
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if(!text || input.disabled) return;
            if(currentChannelId === null) return;
            
            input.value = ''; // clear instantly for good UX
            
            const res = await api('send_message', { 
                channel_id: currentChannelId, 
                receiver: currentDmUser, // Passed if in DM mode
                content: text 
            });
            
            if (!res.success) alert(res.message || "Failed to send message.");
            
            // FIX: Removed manual fetchMessages() call to prevent message duplication bug.
            // The chatInterval will naturally pick it up within 2 seconds.
        }

        async function fetchMessages() {
            if(currentChannelId === null) return;
            
            // Capture the fetch ID at start of request
            const activeFetchId = currentFetchId; 
            
            const res = await api('fetch_messages', { 
                channel_id: currentChannelId, 
                receiver: currentDmUser, 
                last_time: lastMessageTime 
            });
            
            // FIX: If user clicked a different channel while waiting for the server, abort rendering
            if (activeFetchId !== currentFetchId) return; 

            if (res.success && res.messages.length > 0) {
                const container = document.getElementById('messageContainer');
                
                res.messages.forEach(m => {
                    let date = new Date(m.created_at * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    container.innerHTML += `
                        <div class="message">
                            <div class="avatar-small" style="background: #3498db; cursor:pointer;" onclick="openProfile(event, '${m.sender}')">${m.sender.charAt(0).toUpperCase()}</div>
                            <div>
                                <div class="msg-header">
                                    <span class="msg-username" onclick="openProfile(event, '${m.sender}')">${m.sender}</span>
                                    <span class="msg-timestamp">${date}</span>
                                </div>
                                <div class="msg-content">${m.content}</div>
                            </div>
                        </div>
                    `;
                });
                
                lastMessageTime = res.current_time; 
                container.scrollTop = container.scrollHeight; 
            }
        }

        // --- PROFILES & FRIENDS ---
        function openProfile(e, username) {
            e.stopPropagation();
            const popup = document.getElementById('profilePopup');
            
            popup.innerHTML = `
                <div style="display:flex; align-items:center; gap: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom:10px;">
                    <div class="avatar-small" style="background:#e74c3c; width:50px; height:50px; font-size:24px;">${username.charAt(0).toUpperCase()}</div>
                    <div>
                        <h3 style="margin:0; font-size:18px; color:#fff;">${username}</h3>
                        <span style="font-size:12px; color: var(--text-muted);">Student</span>
                    </div>
                </div>
                <button class="btn btn-add-friend" onclick="sendFriendRequest('${username}')">Send Friend Request</button>
            `;

            let x = e.clientX; let y = e.clientY;
            if (x + 250 > window.innerWidth) x -= 250;
            if (y + 150 > window.innerHeight) y -= 150;
            
            popup.style.left = x + 'px'; popup.style.top = y + 'px';
            popup.style.display = 'block';
        }

        document.addEventListener('click', () => { document.getElementById('profilePopup').style.display = 'none'; });

        async function sendFriendRequest(targetUsername) {
            if (targetUsername === myUsername) return alert("You can't add yourself!");
            await api('add_friend', { target: targetUsername });
            alert(`Friend request sent to ${targetUsername}!`);
            document.getElementById('profilePopup').style.display = 'none';
        }

        function searchUser(query) {
            if(!query) return;
            openProfile({clientX: window.innerWidth/2, clientY: window.innerHeight/2, stopPropagation:()=>{}}, query);
            document.getElementById('userSearch').value = '';
        }

        // Boot
        loadServers();
    </script>
</body>
</html>
