<style>
:root {
    --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
    --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
    --w: #caf0f8; --m: #90e0ef; --d: #48cae4;
    --line: rgba(144, 224, 239, 0.2);
    --glass: rgba(0, 29, 61, 0.85);
    --shadow: 0 12px 40px rgba(0,0,0,0.7);
    --r: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg0); color: var(--w); overflow-x: hidden; }
.bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 40px 40px; }
header.topbar { position: fixed; top: 0; left:0; right:0; height: 64px; background: var(--bg1); border-bottom: 2px solid var(--p0); display: flex; align-items: center; padding: 0 24px; z-index: 1000; justify-content: space-between; }
.brand { font-weight: 900; font-size: 22px; color: var(--p1); text-decoration: none; letter-spacing: -1px; }
.btn-nav { background: var(--p2); border: 1px solid var(--p0); color: var(--w); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 13px; }
.btn-nav:hover { background: var(--p0); color: #fff; }
.main { padding: 100px 24px 40px; max-width: 1200px; margin: 0 auto; }
.hero { text-align: center; margin-bottom: 40px; }
.hero h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--p1); }
.searchWrap input { width: 100%; padding: 16px 24px; border-radius: var(--r); background: var(--bg1); border: 1px solid var(--p0); color: #fff; font-size: 16px; outline: none; }
.gamesGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 30px; }
.gameCard { background: var(--bg1); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
.gameCard:hover { transform: translateY(-5px); border-color: var(--p1); box-shadow: var(--shadow); }
.gameIcon { height: 80px; background: var(--p2); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.gameName { padding: 10px; font-size: 11px; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.overlay { position: fixed; inset: 0; background: var(--bg0); z-index: 2000; display: none; flex-direction: column; }
.overlay.open { display: flex; }
.overlay-bar { height: 50px; background: var(--bg1); display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--p0); justify-content: space-between; }
.btn-close { background: #c42b1c; border: none; color: #fff; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-weight: 800; }
iframe { flex: 1; border: none; background: #000; }
</style>

function renderGrid(filter = "") {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = "";
    GAMES.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
        const card = document.createElement('div');
        card.className = 'gameCard';
        card.onclick = () => openGame(game.f, game.name);
        card.innerHTML = `<div class="gameIcon">📘</div><div class="gameName">${game.name}</div>`;
        grid.appendChild(card);
    });
}

function openGame(file, title) {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    document.getElementById('activeTitle').textContent = title;
    frame.src = BASE_URL + file;
    overlay.classList.add('open');
}

function closeGame() {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    frame.src = "";
    overlay.classList.remove('open');
}

function openBrowser() {
    openGame('https://mb.webs.vc', 'Digital Browser');
}

document.getElementById('searchInput').oninput = (e) => renderGrid(e.target.value);
