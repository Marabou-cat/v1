<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Schoolexams V1</title>
<style>
:root {
  /* DARK BLUE THEME PALETTE */
  --bg0: #000814;    /* Deep Black-Blue */
  --bg1: #001d3d;    /* Navy Blue */
  --bg2: #003566;    /* Royal Blue */
  --p0: #0077b6;     /* Bright Blue */
  --p1: #90e0ef;     /* Cyan Accent */
  --p2: #03045e;     /* Midnight Blue */
  --w: #caf0f8;      /* Light Blue Text */
  --m: #90e0ef;      /* Muted Cyan */
  --d: #48cae4;      /* Dimmed Cyan */
  --line: rgba(144, 224, 239, 0.2);
  --glass: rgba(0, 29, 61, 0.7);
  --shadow: 0 12px 40px rgba(0,0,0,0.8);
  --shadow2: 0 0 20px rgba(0, 119, 182, 0.4);
  --r: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg0);
  color: var(--w);
  overflow-x: hidden;
  line-height: 1.6;
}

/* BACKGROUND EFFECTS */
.bg-grid {
  position: fixed; inset: 0; z-index: -1;
  background-image: linear-gradient(var(--line) 1px, transparent 1px), 
                    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 50px 50px;
}

.topbar {
  position: fixed; top: 0; width: 100%; height: 64px;
  background: var(--bg1); border-bottom: 2px solid var(--p0);
  display: flex; align-items: center; padding: 0 20px; z-index: 1000;
}

.brand { font-weight: 900; font-size: 20px; color: var(--p1); text-decoration: none; }

.main { padding: 100px 20px 40px; max-width: 1200px; margin: 0 auto; }

.hero { text-align: center; margin-bottom: 40px; }
.hero h1 { font-size: 3rem; color: var(--p1); text-shadow: 0 0 15px var(--p0); }

/* SEARCH BAR */
.searchWrap { margin-bottom: 30px; position: relative; }
.searchWrap input {
  width: 100%; padding: 15px 20px; border-radius: var(--r);
  background: var(--bg1); border: 1px solid var(--p0);
  color: #fff; font-size: 1rem; outline: none;
  box-shadow: var(--shadow2);
}

/* GAMES GRID */
.gamesGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

.gameCard {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  text-align: center;
}

.gameCard:hover {
  transform: translateY(-5px);
  border-color: var(--p1);
  box-shadow: var(--shadow2);
}

.gameIcon {
  height: 100px; background: var(--p2);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}

.gameName {
  padding: 10px; font-size: 12px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* GAME OVERLAY */
.overlay {
  position: fixed; inset: 0; background: var(--bg0);
  z-index: 2000; display: none; flex-direction: column;
}

.overlay-bar {
  height: 60px; background: var(--bg1); display: flex;
  align-items: center; padding: 0 20px; border-bottom: 2px solid var(--p0);
}

.close-btn {
  padding: 8px 16px; background: var(--p0); border: none;
  color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold;
}

iframe { flex: 1; border: none; width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="bg-grid"></div>

function renderGames(filter = "") {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = "";
    
    GAMES.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
        const card = document.createElement('div');
        card.className = 'gameCard';
        card.onclick = () => openGame(game.f, game.name);
        
        card.innerHTML = `
            <div class="gameIcon">🎮</div>
            <div class="gameName">${game.name}</div>
        `;
        grid.appendChild(card);
    });
}

function openGame(file, name) {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    const title = document.getElementById('activeTitle');
    
    title.textContent = name;
    frame.src = BASE_URL + file;
    overlay.style.display = "flex";
}

function closeGame() {
    const overlay = document.getElementById('gameOverlay');
    const frame = document.getElementById('gameFrame');
    
    frame.src = "";
    overlay.style.display = "none";
}

document.getElementById('searchInput').oninput = (e) => {
    renderGames(e.target.value);
};
