<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SchoolExams - The Reward Wheel</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --p0: #0077b6;
            --p1: #90e0ef; --w: #caf0f8; --r: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg0); color: var(--w); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(144, 224, 239, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(144, 224, 239, 0.1) 1px, transparent 1px); background-size: 40px 40px; }

        h1 { font-size: 3rem; color: var(--p1); text-shadow: 0 0 20px rgba(144, 224, 239, 0.3); margin-bottom: 5px; text-align: center; }
        p { color: var(--w); margin-bottom: 20px; font-size: 1.1rem; text-align: center; }

        .progress-container { background: var(--bg1); border: 2px solid var(--p0); border-radius: 20px; padding: 15px 30px; margin-bottom: 40px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .progress-text { font-weight: bold; margin-bottom: 10px; color: var(--p1); font-size: 1.2rem; }
        .progress-bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--p0), var(--p1)); transition: width 1s linear; }

        .main-layout { display: flex; align-items: center; justify-content: center; gap: 60px; width: 100%; max-width: 900px; flex-wrap: wrap-reverse; }
        .wheel-wrapper { display: flex; flex-direction: column; align-items: center; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin-bottom: 30px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ffd700; z-index: 10; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--p1); box-shadow: 0 0 30px rgba(144, 224, 239, 0.4); background: conic-gradient(
            #0077b6 0% 40%, #00b4d8 40% 70%, #90e0ef 70% 85%, #03045e 85% 95%, #ff0000 95% 100%
        ); transition: transform 4s cubic-bezier(0.175, 0.885, 0.32, 1.05); }

        .btn-spin { background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; color: #000; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); transition: 0.2s; }
        .btn-spin:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 5px 25px rgba(255, 215, 0, 0.5); }
        .btn-spin:disabled { background: #333; color: #888; cursor: not-allowed; box-shadow: none; }

        .result-box { background: var(--bg1); border: 2px solid var(--p0); padding: 30px; border-radius: var(--r); text-align: center; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .result-box.show { opacity: 1; pointer-events: auto; }
        .status-display { background: rgba(0,0,0,0.5); border: 1px solid var(--p1); padding: 15px; border-radius: 8px; font-size: 1.1rem; margin: 15px 0; font-weight: bold; }
        .close-btn { background: #d00000; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; text-decoration: none; display: inline-block; }
        .close-btn:hover { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        
        .redeem-code-box { color: #3ba55c; font-family: monospace; font-size: 1.3rem; letter-spacing: 2px; padding: 10px; background: rgba(0,0,0,0.8); border-radius: 5px; border: 1px dashed #3ba55c; user-select: all; cursor: text; margin: 10px 0; word-break: break-all; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <h1>Event Wheel</h1>
    <p>Earn 1 Spin for every 2 minutes of Playtime!</p>

    <div class="progress-container">
        <div class="progress-text" id="spinStatus">Connecting to Database...</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="playtimeBar"></div></div>
    </div>

    <div class="main-layout">
        <div class="result-box" id="resultBox">
            <h2 id="prizeText" style="color: #ffd700; margin-bottom:10px;">You won!</h2>
            <div id="codeDisplay">Generating code...</div>
            <a href="javascript:window.close();" class="close-btn">Return to Portal</a>
        </div>

        <div class="wheel-wrapper">
            <div class="wheel-container">
                <div class="pointer"></div><div class="wheel" id="wheel"></div>
            </div>
            <button class="btn-spin" id="spinBtn" onclick="spinWheel()" disabled>Spin Locked</button>
        </div>
    </div>

    <script>
        let gameState = null;
        let currentRotation = 0;
        let isSpinning = false;

        async function loadGameFromServer() {
            const formData = new FormData(); formData.append('action', 'load');
            try {
                const response = await fetch('../backend.php', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (result.success && result.data) {
                    gameState = { playtime: parseInt(result.data.playtime) || 0 };
                    updateProgress();
                } else {
                    document.getElementById('spinStatus').innerText = "❌ Please log in on the main portal first!"; document.getElementById('spinStatus').style.color = "#ff4444";
                }
            } catch (e) { 
                document.getElementById('spinStatus').innerText = "❌ Connection Error. Please log in."; document.getElementById('spinStatus').style.color = "#ff4444";
            }
        }

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') loadGameFromServer(); });
        loadGameFromServer();

        function updateProgress() {
            if (!gameState) return;

            let spinsUsed = parseInt(localStorage.getItem('schoolExamsSpinsUsed') || '0');
            if (isNaN(spinsUsed)) { spinsUsed = 0; localStorage.setItem('schoolExamsSpinsUsed', 0); }

            const totalEarnedSpins = Math.floor(gameState.playtime / 120); 
            if (spinsUsed > totalEarnedSpins) { spinsUsed = totalEarnedSpins; localStorage.setItem('schoolExamsSpinsUsed', spinsUsed); }

            const availableSpins = totalEarnedSpins - spinsUsed;
            const secondsTowardsNext = gameState.playtime % 120;
            const progressPercent = (secondsTowardsNext / 120) * 100;

            const btn = document.getElementById('spinBtn'); const statusText = document.getElementById('spinStatus'); const bar = document.getElementById('playtimeBar');

            if (availableSpins > 0) {
                if (!isSpinning) { btn.disabled = false; btn.innerText = `Spin Now (${availableSpins} Available)`; }
                statusText.innerText = "You have spins ready! 🎰"; statusText.style.color = "var(--p1)";
                bar.style.width = "100%"; bar.style.background = "linear-gradient(90deg, #ffd700, #ff8c00)";
            } else {
                if (!isSpinning) { btn.disabled = true; btn.innerText = "Play to Unlock"; }
                const totalSecondsLeft = 120 - secondsTowardsNext; const minsLeft = Math.floor(totalSecondsLeft / 60); const secsLeft = totalSecondsLeft % 60;
                statusText.innerText = `Next spin in: ${minsLeft}m ${secsLeft}s ⏳`; statusText.style.color = "var(--p1)";
                bar.style.width = `${progressPercent}%`; bar.style.background = "linear-gradient(90deg, var(--p0), var(--p1))";
            }
        }

        setInterval(() => { 
            if (!gameState) return; 
            if (document.hidden) return; 
            gameState.playtime++; 
            updateProgress(); 
        }, 1000);

        function spinWheel() {
            if (!gameState) return;
            const btn = document.getElementById('spinBtn'); const wheel = document.getElementById('wheel'); const resultBox = document.getElementById('resultBox');
            isSpinning = true; btn.disabled = true; resultBox.classList.remove('show');

            let spinsUsed = parseInt(localStorage.getItem('schoolExamsSpinsUsed') || '0'); localStorage.setItem('schoolExamsSpinsUsed', spinsUsed + 1);

            const rand = Math.random() * 100; let prizeAmount = 0; let extraRotation = 0; let prizeName = "";

            if (rand <= 40) { prizeAmount = 25; extraRotation = 72; prizeName = "25 ExamCoins"; }
            else if (rand <= 70) { prizeAmount = 50; extraRotation = 198; prizeName = "50 ExamCoins"; }
            else if (rand <= 85) { prizeAmount = 75; extraRotation = 288; prizeName = "75 ExamCoins"; }
            else if (rand <= 95) { prizeAmount = 1000; extraRotation = 340; prizeName = "1000 ExamCoins"; }
            else { prizeAmount = 10000; extraRotation = 358; prizeName = "EXCLUSIVE DRAGON CURSOR!"; }

            currentRotation += (360 * 5) + extraRotation; wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('prizeText').innerText = `🎉 You won: ${prizeName} 🎉`;
                
                // GENERATE REDEEM CODE INSTEAD OF BACKEND DIRECT DEPOSIT
                const randomHash = Math.random().toString(36).substring(2, 10).toUpperCase();
                const rawCode = `EXAM-${prizeAmount}-${randomHash}`;
                const encodedCode = btoa(rawCode);

                document.getElementById('codeDisplay').innerHTML = `
                    <div style='color:#aaa; font-size: 0.9rem; margin-top: 10px;'>Your Redeem Code:</div>
                    <div class='redeem-code-box'>${encodedCode}</div>
                    <div style='color:#fff; font-size: 0.8rem; margin-bottom: 20px;'>(Copy this and paste it in the Main Portal!)</div>
                `;

                resultBox.classList.add('show'); isSpinning = false; updateProgress();
            }, 4000);
        }
    </script>
</body>
</html>
