<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SchoolExams - Battle Pass</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --w: #caf0f8; --r: 16px;
        }

        *, html, body, button, a, input { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        #dom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; pointer-events: none; z-index: 9999999;
            transform: translate(-2px, -2px); display: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            will-change: transform;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg0); color: var(--w); overflow-x: hidden; padding-top: 100px; display: flex; flex-direction: column; height: 100vh; }
        .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(rgba(144, 224, 239, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(144, 224, 239, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
        
        header.topbar { position: fixed; top: 0; left:0; right:0; height: 70px; background: rgba(0, 29, 61, 0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--p0); display: flex; align-items: center; padding: 0 30px; z-index: 1000; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; font-size: 24px; color: var(--p1); text-decoration: none; letter-spacing: -1px; }
        .brand img { height: 45px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .tracker-group { display: flex; gap: 15px; align-items: center; }
        .coin-tracker { background: rgba(0,0,0,0.5); border: 1px solid var(--p1); padding: 8px 16px; border-radius: 20px; font-weight: 800; color: #ffd700; display: flex; align-items: center; gap: 8px; font-size: 14px; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .gem-tracker { border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        
        .btn-nav { background: #d00000; border: none; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: 900; text-decoration: none; transition: 0.2s; display: inline-block; }
        .btn-nav:hover { background: #ff0000; box-shadow: 0 0 15px #ff0000; transform: translateY(-2px); }

        .container { flex: 1; display: flex; flex-direction: column; max-width: 100%; margin: 0 auto; padding: 20px; text-align: center; overflow: hidden; }
        h1 { font-size: 3rem; color: #9b59b6; text-shadow: 0 0 20px rgba(155, 89, 182, 0.5); margin-bottom: 5px; }
        p { font-size: 1.1rem; color: var(--p1); margin-bottom: 20px; }

        .progress-header { background: var(--bg1); border: 2px solid #9b59b6; padding: 15px 30px; border-radius: var(--r); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-wrap: wrap; gap: 20px; }
        .level-badge { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: #fff; padding: 10px 30px; border-radius: 30px; font-size: 1.5rem; font-weight: 900; box-shadow: 0 0 15px rgba(155, 89, 182, 0.6); }
        .time-left { font-size: 1.1rem; color: #ffd700; font-weight: bold; }
        
        .buy-premium-btn { background: linear-gradient(135deg, #00ffcc, #00b38f); border: none; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: 0.2s; cursor: pointer; }
        .buy-premium-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 204, 0.7); }
        .premium-active-badge { background: #ffd700; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); display: none; }

        /* HORIZONTAL SCROLLING LAYOUT */
        .bp-scroll-container { display: flex; overflow-x: auto; gap: 15px; padding: 10px 10px 30px 10px; scroll-behavior: smooth; align-items: flex-start; flex: 1; }
        .bp-scroll-container::-webkit-scrollbar { height: 14px; }
        .bp-scroll-container::-webkit-scrollbar-track { background: var(--bg0); border-radius: 10px; border: 1px solid var(--p0); }
        .bp-scroll-container::-webkit-scrollbar-thumb { background: linear-gradient(90deg, #8e44ad, #9b59b6); border-radius: 10px; }

        .bp-tier { display: flex; flex-direction: column; min-width: 240px; gap: 10px; background: var(--bg1); padding: 15px; border-radius: var(--r); border: 2px solid var(--p0); position: relative; transition: 0.3s; flex-shrink: 0; }
        .bp-tier.locked-tier { opacity: 0.7; filter: grayscale(0.6); border-color: #333; }
        .bp-tier.unlocked-tier { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .bp-level-label { text-align: center; font-weight: 900; color: var(--w); font-size: 1.3rem; margin-bottom: 5px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .bp-card { background: var(--bg2); border: 1px solid var(--p0); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .bp-card .card-type { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
        .bp-card.premium-card { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); }
        .bp-card.premium-card .card-type { color: #ffd700; }
        
        .bp-card .reward-text { font-size: 16px; font-weight: bold; color: #fff; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        
        .btn-claim { background: #3ba55c; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-claim:hover { background: #43b581; box-shadow: 0 0 15px rgba(59, 165, 92, 0.5); }
        .btn-claim.locked { background: #333; color: #777; pointer-events: none; }
        .btn-claim.claimed { background: transparent; border: 2px solid #3ba55c; color: #3ba55c; pointer-events: none; }

        /* Premium Lock Overlay */
        .premium-locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; color: #ffd700; font-size: 1rem; z-index: 5; backdrop-filter: blur(2px); border: 1px solid #ffd700; }

        .toast { position: fixed; bottom: 30px; right: 30px; background: #9b59b6; color: #fff; padding: 16px 24px; border-radius: 12px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: translateY(100px); opacity: 0; transition: 0.4s; z-index: 3000; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

<img id="dom-cursor" src="https://marabou-cat.github.io/GamesV1/DefMouse.png" alt="">
<div class="bg-grid"></div>

<header class="topbar">
    <a href="index.html" class="brand">
        <img src="https://marabou-cat.github.io/GamesV1/logo.png" alt="Logo" onerror="this.style.display='none'">
        SchoolExams
    </a>
    <div class="tracker-group">
        <div class="coin-tracker">🪙 <span id="coinDisplay">0</span></div>
        <div class="coin-tracker gem-tracker">💎 <span id="gemDisplay">0</span></div>
        <a href="index.html" class="btn-nav">⬅ Back</a>
    </div>
</header>

<div class="container">
    <h1>Season 1 Battle Pass</h1>
    <p>Earn 1 Level for every 5 Minutes of Playtime!</p>

    <div class="progress-header">
        <div class="level-badge">Current Level: <span id="currLvl">0</span> / 50</div>
        <div class="time-left" id="timeLeft">Next level in: --:--</div>
        
        <button class="buy-premium-btn" id="btnBuyPremium" onclick="buyPremium()">Unlock Premium (1000 💎)</button>
        <div class="premium-active-badge" id="badgePremium">👑 Premium Active</div>
    </div>

    <div class="bp-scroll-container" id="bpTrack">
        </div>
</div>

<div class="toast" id="bpToast">🎁 Reward Claimed!</div>

<script>
// --- CUSTOM CURSOR TRACKING ---
const domCursor = document.getElementById('dom-cursor');
let currentCursorSrc = localStorage.getItem('currentCursorSrc') || "https://marabou-cat.github.io/GamesV1/DefMouse.png";
domCursor.src = currentCursorSrc;

let mouseX = 0, mouseY = 0; let cursorVisible = false;
document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    if (!cursorVisible) { domCursor.style.display = 'block'; cursorVisible = true; }
});
function updateCursorPosition() {
    if (cursorVisible) { domCursor.style.transform = `translate3d(${mouseX - 2}px, ${mouseY - 2}px, 0)`; }
    requestAnimationFrame(updateCursorPosition);
}
requestAnimationFrame(updateCursorPosition);
document.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget) { domCursor.style.display = 'none'; cursorVisible = false; }
});

// --- GLOBAL STATS ---
let examCoins = parseInt(localStorage.getItem('schoolExamsCoins') || '0');
let gems = parseInt(localStorage.getItem('schoolExamsGems') || '0');
let hasPremium = localStorage.getItem('schoolExamsPremiumBP') === 'true';

document.getElementById('coinDisplay').innerText = examCoins.toLocaleString();
document.getElementById('gemDisplay').innerText = gems.toLocaleString();

if (hasPremium) {
    document.getElementById('btnBuyPremium').style.display = 'none';
    document.getElementById('badgePremium').style.display = 'inline-block';
}

function showToast(msg) {
    const toast = document.getElementById('bpToast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// --- BUY PREMIUM ---
function buyPremium() {
    if (gems >= 1000) {
        gems -= 1000;
        localStorage.setItem('schoolExamsGems', gems);
        localStorage.setItem('schoolExamsPremiumBP', 'true');
        hasPremium = true;
        document.getElementById('gemDisplay').innerText = gems.toLocaleString();
        document.getElementById('btnBuyPremium').style.display = 'none';
        document.getElementById('badgePremium').style.display = 'inline-block';
        showToast("👑 Premium Pass Unlocked!");
        renderBP(); // Re-render to remove locks
    } else {
        alert("❌ You need 1,000 Gems to unlock the Premium Pass!");
    }
}

// --- DATA GENERATION (1-50) ---
const BP_TIERS = [];
for (let i = 1; i <= 50; i++) {
    // Normal Logic (Total 350 Gems)
    let normText = "50 ExamCoins", normType = "coins", normAmt = 50;
    if (i === 10 || i === 25 || i === 35) { normText = "📦 Silver Cursor Pack"; normType = "silver_pack"; normAmt = 0; }
    else if (i === 50) { normText = "🌟 Golden Cursor Pack"; normType = "golden_pack"; normAmt = 0; }
    else if (i === 5 || i === 15 || i === 20 || i === 30 || i === 40) { normText = "💎 50 Gems"; normType = "gems"; normAmt = 50; }
    else if (i === 45) { normText = "💎 100 Gems"; normType = "gems"; normAmt = 100; }

    // Premium Logic (Total 900 Gems)
    let premText = "200 ExamCoins", premType = "coins", premAmt = 200, premId = null;
    if (i === 10 || i === 20 || i === 30 || i === 40) { premText = "🌟 Golden Cursor Pack"; premType = "golden_pack"; premAmt = 0; }
    else if (i === 50) { premText = "👑 King Midas Pet"; premType = "pet"; premAmt = 0; premId = "midas"; }
    else if (i === 5 || i === 15) { premText = "💎 150 Gems"; premType = "gems"; premAmt = 150; }
    else if (i === 25 || i === 35 || i === 45) { premText = "💎 200 Gems"; premType = "gems"; premAmt = 200; }

    BP_TIERS.push({
        lvl: i,
        normal: { text: normText, type: normType, amount: normAmt },
        premium: { text: premText, type: premType, amount: premAmt, id: premId }
    });
}

let claimedNormal = JSON.parse(localStorage.getItem('schoolExamsBPClaimed')) || [];
let claimedPremium = JSON.parse(localStorage.getItem('schoolExamsPremiumClaimed')) || [];
let currentLevel = 0;

function renderBP() {
    const track = document.getElementById('bpTrack');
    track.innerHTML = "";

    BP_TIERS.forEach(tier => {
        const isUnlocked = currentLevel >= tier.lvl;
        const tierClass = isUnlocked ? "unlocked-tier" : "locked-tier";

        // NORMAL CARD
        const nClaimed = claimedNormal.includes(tier.lvl);
        let nBtn = nClaimed ? `<button class="btn-claim claimed">Claimed</button>` 
            : (isUnlocked ? `<button class="btn-claim" onclick="claimReward(${tier.lvl}, 'normal')">Claim</button>` 
            : `<button class="btn-claim locked">Locked</button>`);
            
        let normColor = tier.normal.type === 'gems' ? 'color: #00ffcc;' : '';

        // PREMIUM CARD
        const pClaimed = claimedPremium.includes(tier.lvl);
        let pBtn = pClaimed ? `<button class="btn-claim claimed">Claimed</button>` 
            : (isUnlocked && hasPremium ? `<button class="btn-claim" onclick="claimReward(${tier.lvl}, 'premium')">Claim</button>` 
            : `<button class="btn-claim locked">Locked</button>`);
            
        let pOverlay = (!hasPremium) ? `<div class="premium-locked-overlay">🔒 Premium</div>` : ``;
        let premColor = tier.premium.type === 'gems' ? 'color: #00ffcc;' : 'color: #ffd700;';

        track.innerHTML += `
            <div class="bp-tier ${tierClass}">
                <div class="bp-level-label">Level ${tier.lvl}</div>
                
                <div class="bp-card">
                    <div class="card-type">Free Reward</div>
                    <div class="reward-text" style="${normColor}">${tier.normal.text}</div>
                    ${nBtn}
                </div>

                <div class="bp-card premium-card" style="position: relative;">
                    ${pOverlay}
                    <div class="card-type">Premium Reward</div>
                    <div class="reward-text" style="${premColor}">${tier.premium.text}</div>
                    ${pBtn}
                </div>
            </div>
        `;
    });
}

function claimReward(lvl, trackType) {
    if (trackType === 'normal' && claimedNormal.includes(lvl)) return;
    if (trackType === 'premium' && claimedPremium.includes(lvl)) return;
    if (trackType === 'premium' && !hasPremium) return;

    const tier = BP_TIERS.find(t => t.lvl === lvl);
    const reward = trackType === 'normal' ? tier.normal : tier.premium;

    if (reward.type === "coins") {
        examCoins += reward.amount;
        localStorage.setItem('schoolExamsCoins', examCoins);
        document.getElementById('coinDisplay').innerText = examCoins.toLocaleString();
        showToast(`+${reward.amount} Coins Claimed!`);
        
    } else if (reward.type === "gems") {
        gems += reward.amount;
        localStorage.setItem('schoolExamsGems', gems);
        document.getElementById('gemDisplay').innerText = gems.toLocaleString();
        showToast(`💎 +${reward.amount} Gems Claimed!`);
        
    } else if (reward.type === "silver_pack") {
        const bpCursors = [ { id: "bp1", name: "Silver Apple" }, { id: "bp2", name: "Robot BOB" }, { id: "bp3", name: "Silver Statue" } ];
        const wonCursor = bpCursors[Math.floor(Math.random() * 3)];
        let owned = JSON.parse(localStorage.getItem('ownedCursors')) || ["def"];
        if (!owned.includes(wonCursor.id)) { owned.push(wonCursor.id); localStorage.setItem('ownedCursors', JSON.stringify(owned)); alert(`📦 Opening Silver Pack...\n\n✨ You got the ${wonCursor.name}!\nIt's in your Cursor Shop.`); } 
        else { alert(`📦 Opening Silver Pack...\n\n✨ You got the ${wonCursor.name}!\n(You already owned this item).`); }
        showToast(`Silver Pack Opened!`);
        
    } else if (reward.type === "golden_pack") {
        const bpGoldenCursors = [ { id: "bp4", name: "Midas Sword" }, { id: "bp5", name: "Golden Flame" }, { id: "bp6", name: "Royal Gleam" } ];
        const wonCursor = bpGoldenCursors[Math.floor(Math.random() * 3)];
        let owned = JSON.parse(localStorage.getItem('ownedCursors')) || ["def"];
        if (!owned.includes(wonCursor.id)) { owned.push(wonCursor.id); localStorage.setItem('ownedCursors', JSON.stringify(owned)); alert(`🌟 Opening Golden Pack...\n\n👑 You got the ${wonCursor.name}!\nIt's in your Cursor Shop.`); } 
        else { alert(`🌟 Opening Golden Pack...\n\n👑 You got the ${wonCursor.name}!\n(You already owned this item).`); }
        showToast(`Golden Pack Opened!`);
        
    } else if (reward.type === "pet") {
        let ownedPets = JSON.parse(localStorage.getItem('schoolExamsOwnedPets')) || [];
        if (!ownedPets.includes(reward.id)) {
            ownedPets.push(reward.id);
            localStorage.setItem('schoolExamsOwnedPets', JSON.stringify(ownedPets));
            alert(`👑 INCREDIBLE! You unlocked the exclusive ${reward.text}!\nIt has been permanently added to your Pet Adoption Center.`);
        } else {
            alert(`👑 You claimed the ${reward.text}, but you already own it!`);
        }
        showToast(`Exclusive Pet Unlocked!`);
    }

    if (trackType === 'normal') {
        claimedNormal.push(lvl);
        localStorage.setItem('schoolExamsBPClaimed', JSON.stringify(claimedNormal));
    } else {
        claimedPremium.push(lvl);
        localStorage.setItem('schoolExamsPremiumClaimed', JSON.stringify(claimedPremium));
    }
    
    renderBP();
}

function updateProgress() {
    let playSeconds = parseInt(localStorage.getItem('schoolExamsPlayTimeSecs') || '0');
    currentLevel = Math.min(50, Math.floor(playSeconds / 300));
    document.getElementById('currLvl').innerText = currentLevel;

    if (currentLevel >= 50) {
        document.getElementById('timeLeft').innerText = "MAX LEVEL REACHED!";
        document.getElementById('timeLeft').style.color = "#3ba55c";
    } else {
        let secondsTowardsNext = playSeconds % 300;
        let secondsLeft = 300 - secondsTowardsNext;
        let m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
        let s = (secondsLeft % 60).toString().padStart(2, '0');
        document.getElementById('timeLeft').innerText = `Next level in: ${m}:${s}`;
    }

    playSeconds++;
    localStorage.setItem('schoolExamsPlayTimeSecs', playSeconds);
    if (playSeconds > 0 && playSeconds % 600 === 0) {
        examCoins += 100;
        localStorage.setItem('schoolExamsCoins', examCoins);
        document.getElementById('coinDisplay').innerText = examCoins.toLocaleString();
    }
}

updateProgress();
renderBP();
setInterval(() => {
    updateProgress();
    let latestLocked = document.querySelector('.bp-tier.locked-tier .bp-level-label');
    if (latestLocked && latestLocked.innerText === `LEVEL ${currentLevel}`) {
        renderBP();
    }
}, 1000);
</script>
</body>
</html>
