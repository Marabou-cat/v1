<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Live Trade Room - Digital Portal</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
            --w: #caf0f8; --m: #90e0ef; --d: #48cae4;
            --line: rgba(144, 224, 239, 0.2);
            --glass: rgba(0, 29, 61, 0.85);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --glow-blue: 0 0 20px rgba(144, 224, 239, 0.4);
            --glow-green: 0 0 25px rgba(59, 165, 92, 0.6);
            --glow-red: 0 0 25px rgba(255, 68, 68, 0.6);
            --r: 20px;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg0); 
            color: var(--w); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .bg-grid { 
            position: fixed; inset: 0; z-index: -1; 
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); 
            background-size: 40px 40px; 
        }

        header {
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 29, 61, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--p0);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            color: var(--p1);
            font-size: 32px;
            letter-spacing: 2px;
            text-shadow: var(--glow-blue);
        }

        #lobby {
            background: var(--glass);
            border: 2px solid var(--p0);
            border-radius: var(--r);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: var(--shadow), var(--glow-blue);
            margin-top: 50px;
        }

        .input-large {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 2px solid var(--p2);
            background: var(--bg0);
            color: #fff;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-large:focus { border-color: var(--p1); box-shadow: var(--glow-blue); }

        .btn {
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { transform: translateY(-3px); }
        .btn:active { transform: translateY(1px); }

        .btn-blue { background: var(--p0); color: #fff; }
        .btn-blue:hover { background: var(--p1); color: var(--bg0); box-shadow: var(--glow-blue); }
        .btn-green { background: #3ba55c; color: #fff; }
        .btn-green:hover { background: #43b581; box-shadow: var(--glow-green); }
        .btn-danger { background: #d00000; color: #fff; }
        .btn-danger:hover { background: #ff0000; box-shadow: var(--glow-red); }

        .trade-board {
            display: none;
            justify-content: center;
            gap: 40px;
            width: 95%;
            max-width: 1200px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .trade-window {
            flex: 1;
            min-width: 350px;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            border: 3px solid var(--p2);
            border-radius: var(--r);
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .trade-window.ready { border-color: #3ba55c; box-shadow: 0 0 30px rgba(59, 165, 92, 0.4); }

        .window-header {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--line);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #myHeader { color: var(--p1); text-shadow: var(--glow-blue); }
        #theirHeader { color: #ff4444; text-shadow: var(--glow-red); }

        .offer-zone {
            background: rgba(0,0,0,0.4);
            border: 2px dashed var(--p0);
            border-radius: 12px;
            min-height: 150px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .inventory-zone {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .item-card {
            background: var(--bg0);
            border: 2px solid var(--p2);
            padding: 12px 8px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .inventory-zone .item-card:hover { border-color: var(--p1); background: var(--p0); transform: scale(1.02); }

        .status-badge {
            background: var(--bg0);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid var(--line);
            margin-top: auto;
        }

        .section-title { font-size: 12px; color: var(--p1); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <header>
        <h1>CORE TRADE TERMINAL</h1>
    </header>

    <div id="lobby">
        <h2 style="color: var(--p1); margin-top: 0;">Initiate Trade Sequence</h2>
        <button class="btn btn-blue" onclick="createRoom()" style="margin-bottom: 30px;">📡 Host Trade Room</button>
        
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <hr style="flex:1; border-color: var(--line);">
            <span style="color: var(--line); font-weight: bold;">OR</span>
            <hr style="flex:1; border-color: var(--line);">
        </div>

        <input type="text" id="joinCode" class="input-large" placeholder="ENTER ROOM CODE">
        <button class="btn btn-green" onclick="joinRoom()">🔗 Connect to Room</button>
        
        <br><br>
        <button class="btn btn-danger" onclick="window.location.href='../index.html'" style="margin-top: 20px;">Exit to Portal</button>
    </div>

    <div class="trade-board" id="tradeBoard">
        <div class="trade-window" id="myWindow">
            <div class="window-header" id="myHeader">My Transmit</div>
            
            <div class="section-title">Items Offered</div>
            <div class="offer-zone" id="myOfferList">
                <div style="color: gray; text-align: center; margin-top: 40px;">Select items...</div>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="number" id="gemInput" class="input-large" style="margin-bottom: 0; padding: 10px; font-size: 16px;" placeholder="Amount...">
                <button class="btn btn-blue" onclick="offerGems()" style="padding: 10px; width: auto; font-size: 14px;">➕ ADD</button>
            </div>
            <div id="gemBalanceDisplay" style="font-size: 12px; color: var(--p1); margin-bottom: 20px; padding-left: 5px;">Available Gems: Loading...</div>

            <button class="btn btn-green" onclick="toggleAccept()" id="acceptBtn" style="margin-bottom: 20px;">Ready to Trade</button>
            
            <div class="section-title">Encrypted Inventory</div>
            <div class="inventory-zone" id="myInventory"></div>
        </div>

        <div class="trade-window" id="theirWindow">
            <div class="window-header" id="theirHeader">Target Receive</div>
            
            <div class="section-title">Target Offer</div>
            <div class="offer-zone" id="theirOfferList">
                <div style="color: gray; text-align: center; margin-top: 40px;">Awaiting transmission...</div>
            </div>
            
            <div class="status-badge" id="theirStatus">Target Not Ready</div>
        </div>
    </div>

<script>
    const tradeableItems = [
        { id: "midas", name: "King Midas" },
        { id: "phoenix", name: "Mythic Phoenix" },
        { id: "dragon", name: "Mythic Dragon" },
        { id: "prism", name: "Prism Wing" },
        { id: "bp1", name: "Silver Apple" },
        { id: "bp2", name: "Robot BOB" },
        { id: "bp3", name: "Silver Statue" },
        { id: "bp4", name: "Midas Sword" },
        { id: "bp5", name: "Golden Flame" },
        { id: "bp6", name: "Royal Gleam" }
    ];

    let currentRoom = null;
    let myOffer = { items: [], gems: 0 }; 
    let myOwnedIDs = []; 
    let myTotalGems = 0; 
    let pollInterval = null;

    // POINTING TO YOUR REAL BACKEND
    async function api(action, data = {}) {
        const fd = new FormData();
        fd.append('action', action);
        for (let key in data) fd.append(key, data[key]);
        
        try {
            // First try main backend for inventory/gems, 
            // but use live_trade_backend for the ROOM logic
            const endpoint = (action === 'get_inventory') ? '../backend.php' : 'live_trade_backend.php';
            const res = await fetch(endpoint, { method: 'POST', body: fd });
            return await res.json();
        } catch (e) {
            console.error("API Error:", e);
            return { success: false };
        }
    }

    async function createRoom() {
        const res = await api('create_room');
        if (res.success) {
            alert(`Room Created! Code: ${res.room_code}`);
            enterRoom(res.room_code);
        }
    }

    async function joinRoom() {
        const code = document.getElementById('joinCode').value.toUpperCase();
        if(!code) return alert("Enter a code.");
        const res = await api('join_room', { room_code: code });
        if (res.success) enterRoom(code);
        else alert(res.message);
    }

    function enterRoom(code) {
        currentRoom = code;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('tradeBoard').style.display = 'flex';
        loadInventory(); 
        pollInterval = setInterval(syncRoom, 1500);
    }

    async function loadInventory() {
        const res = await api('get_inventory');
        if (res.success) {
            // Mapping data from your backend.php
            myOwnedIDs = res.inventory || [];
            myTotalGems = parseInt(res.gems) || 0;
            
            document.getElementById('gemBalanceDisplay').innerText = `Available Gems: ${myTotalGems.toLocaleString()}`;
            renderInventory();
        } else {
            document.getElementById('gemBalanceDisplay').innerText = `Error loading gems.`;
        }
    }

    function renderInventory() {
        const invDiv = document.getElementById('myInventory');
        invDiv.innerHTML = '';
        let hasTradeable = false;

        myOwnedIDs.forEach(id => {
            const itemDef = tradeableItems.find(i => i.id === id);
            if (itemDef) { 
                hasTradeable = true;
                if (myOffer.items.includes(id)) {
                    invDiv.innerHTML += `<div class="item-card" style="opacity: 0.4; cursor: not-allowed;">${itemDef.name}</div>`;
                } else {
                    invDiv.innerHTML += `<div class="item-card" onclick="addToOffer('${itemDef.id}')">${itemDef.name}</div>`;
                }
            }
        });
        
        if (!hasTradeable) invDiv.innerHTML = '<div style="color:gray; grid-column: 1/-1; text-align:center;">No tradeable items found.</div>';
    }

    async function offerGems() {
        const amount = parseInt(document.getElementById('gemInput').value);
        if (isNaN(amount) || amount <= 0) return;
        if (amount > myTotalGems) return alert(`Insufficient Gems!`);
        
        myOffer.gems = amount;
        document.getElementById('gemInput').value = ''; 
        await updateOfferData();
    }

    async function removeGems() {
        myOffer.gems = 0;
        await updateOfferData();
    }

    async function addToOffer(id) {
        if (!myOffer.items.includes(id)) {
            myOffer.items.push(id);
            await updateOfferData();
        }
    }

    async function removeFromOffer(id) {
        myOffer.items = myOffer.items.filter(itemId => itemId !== id);
        await updateOfferData();
    }

    async function updateOfferData() {
        renderMyOffer();
        renderInventory(); 
        await api('update_offer', { room_code: currentRoom, offer: JSON.stringify(myOffer) });
    }

    function renderMyOffer() {
        const list = document.getElementById('myOfferList');
        if (myOffer.items.length === 0 && myOffer.gems === 0) {
            list.innerHTML = '<div style="color: gray; text-align: center; margin-top: 40px;">Select items...</div>';
            return;
        }
        
        let html = '';
        if (myOffer.gems > 0) {
            html += `<div class="item-card" style="border-color: #00ffcc; color: #00ffcc;" onclick="removeGems()">💎 ${myOffer.gems.toLocaleString()} Gems (X)</div>`;
        }
        html += myOffer.items.map(id => {
            let name = tradeableItems.find(i => i.id === id).name;
            return `<div class="item-card" style="border-color: #ff4444;" onclick="removeFromOffer('${id}')">❌ ${name}</div>`;
        }).join('');
        list.innerHTML = html;
    }

    async function toggleAccept() {
        await api('toggle_accept', { room_code: currentRoom });
        syncRoom(); 
    }

    async function syncRoom() {
        const res = await api('sync', { room_code: currentRoom });
        if (!res.success) return;

        if (res.status === 'completed') {
            clearInterval(pollInterval);
            alert("TRADE SUCCESSFUL!");
            window.location.href = "../index.html"; 
            return;
        }

        let tItems = [], tGems = 0;
        if (res.their_offer && typeof res.their_offer === 'object') {
            tItems = res.their_offer.items || [];
            tGems = res.their_offer.gems || 0;
        }

        const tList = document.getElementById('theirOfferList');
        if (tItems.length === 0 && tGems === 0) {
            tList.innerHTML = '<div style="color: gray; text-align: center; margin-top: 40px;">Awaiting transmission...</div>';
        } else {
            let h = '';
            if (tGems > 0) h += `<div class="item-card" style="border-color: #00ffcc; color: #00ffcc;">💎 ${tGems.toLocaleString()} Gems</div>`;
            h += tItems.map(id => `<div class="item-card">${tradeableItems.find(i => i.id === id)?.name || id}</div>`).join('');
            tList.innerHTML = h;
        }

        const btn = document.getElementById('acceptBtn');
        if (res.my_accept) {
            document.getElementById('myWindow').classList.add('ready');
            btn.className = 'btn btn-danger'; btn.innerText = 'CANCEL';
        } else {
            document.getElementById('myWindow').classList.remove('ready');
            btn.className = 'btn btn-green'; btn.innerText = 'READY';
        }

        const tStatus = document.getElementById('theirStatus');
        if (res.their_accept) {
            document.getElementById('theirWindow').classList.add('ready');
            tStatus.innerText = 'TARGET READY'; tStatus.style.color = '#3ba55c';
        } else {
            document.getElementById('theirWindow').classList.remove('ready');
            tStatus.innerText = 'TARGET NOT READY'; tStatus.style.color = 'var(--w)';
        }
    }
</script>
</body>
</html>
