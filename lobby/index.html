<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Chat Lobby-Online</title>
    <style>
        :root {
            --bg0: #000814; --bg1: #001d3d; --bg2: #003566;
            --p0: #0077b6; --p1: #90e0ef; --p2: #03045e;
            --w: #caf0f8; --line: rgba(144, 224, 239, 0.2);
            --glass: rgba(0, 29, 61, 0.85);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --glow: 0 0 20px rgba(144, 224, 239, 0.3);
            --r: 16px;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg0); color: var(--w); 
            margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .btn-back { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.85); border: 2px solid var(--p0); 
            color: var(--p1); padding: 10px 20px; border-radius: 20px; 
            text-decoration: none; font-weight: 900; transition: 0.3s; z-index: 1000;
        }
        .btn-back:hover { background: var(--p0); color: #fff; box-shadow: var(--glow); }

        /* --- UI WRAPPERS --- */
        .panel {
            background: var(--glass); border: 2px solid var(--p0); border-radius: var(--r);
            padding: 30px; width: 90%; max-width: 600px; box-shadow: var(--shadow), var(--glow);
            z-index: 10;
        }

        h1, h2 { color: var(--p1); text-shadow: var(--glow); margin-top: 0; text-transform: uppercase; letter-spacing: 2px; text-align: center;}
        
        .input-box {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px;
            border: 2px solid var(--p2); background: var(--bg2); color: #fff;
            font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box;
            font-weight: bold;
        }
        .input-box:focus { border-color: var(--p1); box-shadow: var(--glow); }

        .btn {
            background: var(--p0); color: #fff; border: none; padding: 15px;
            border-radius: 8px; font-size: 16px; font-weight: bold; transition: 0.3s;
            width: 100%; cursor: pointer; text-transform: uppercase;
        }
        .btn:hover { background: var(--p1); color: var(--bg0); box-shadow: var(--glow); transform: translateY(-2px); }
        .btn-green { background: #3ba55c; }
        .btn-green:hover { background: #43b581; box-shadow: 0 0 15px rgba(59,165,92,0.5); }
        .btn-secondary { background: transparent; border: 2px solid var(--p0); margin-top: 10px; }
        .btn-secondary:hover { background: rgba(0, 119, 182, 0.2); color: #fff; box-shadow: none;}

        /* --- SERVER LIST STYLES --- */
        .server-list {
            background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid var(--p2);
            min-height: 200px; max-height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 15px;
        }
        .server-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg2); padding: 10px 15px; border-radius: 8px; margin-bottom: 10px;
            border: 1px solid var(--p0);
        }
        .server-item h3 { margin: 0; font-size: 16px; color: #fff; }
        .server-item span { font-size: 12px; color: #aaa; }
        .btn-join-small { background: #3ba55c; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-join-small:hover { background: #43b581; transform: scale(1.05); }

        /* --- GAME SCREEN --- */
        #gameScreen { display: none; width: 100vw; height: 100vh; position: relative; }

        .room-info {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); border: 2px solid var(--p1); padding: 10px 20px;
            border-radius: 12px; font-weight: bold; color: var(--p1); z-index: 10;
            box-shadow: var(--glow); text-align: right;
        }

        #playArea { width: 100%; height: 100%; position: relative; overflow: hidden; }

        .player {
            position: absolute; width: 40px; height: 40px;
            background: var(--p1); border-radius: 50%;
            transform: translate(-50%, -50%); 
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #000; box-shadow: 0 0 15px var(--p1);
            transition: left 0.1s linear, top 0.1s linear; 
            user-select: none; z-index: 5;
        }
        .player.me { background: #ffd700; box-shadow: 0 0 20px #ffd700; z-index: 6;}
        
        .player-name {
            position: absolute; top: -25px; white-space: nowrap;
            background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 8px;
            font-size: 12px; color: #fff; font-weight: bold;
        }

        /* Trailing Pet Styles */
        .pet-follower {
            position: absolute; width: 35px; height: 35px; pointer-events: none;
            transition: left 0.2s cubic-bezier(0.25, 1, 0.5, 1), top 0.2s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 4; display: flex; align-items: center; justify-content: center; font-size: 28px;
            transform: translate(-50%, -50%);
        }
        .pet-follower img { width: 100%; height: 100%; object-fit: contain; }

        .chat-bubble {
            position: absolute; bottom: 50px; background: #fff; color: #000;
            padding: 8px 12px; border-radius: 12px; font-size: 14px; font-weight: bold;
            white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none; z-index: 7;
        }
        .chat-bubble::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            border-width: 5px 5px 0; border-style: solid; border-color: #fff transparent transparent transparent;
        }

        .chat-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; width: 90%; max-width: 600px; z-index: 10;
        }
        .chat-input {
            flex: 1; padding: 15px; border-radius: 20px; border: 2px solid var(--p0);
            background: rgba(0,0,0,0.8); color: #fff; font-size: 16px; outline: none;
            backdrop-filter: blur(5px);
        }
        .chat-input:focus { border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        
        /* TABS */
        .menu-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: var(--bg2); color: #fff; border: 2px solid var(--p2); padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--p0); border-color: var(--p1); box-shadow: var(--glow); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <a href="../index.html" class="btn-back" id="leaveBtn">⬅ Leave Room</a>

    <!-- MENU SCREEN -->
    <div id="menuScreen" class="panel">
        <h1>Lobby Network</h1>
        
        <div class="menu-tabs">
            <button class="tab-btn active" onclick="switchTab('public')">Public Servers</button>
            <button class="tab-btn" onclick="switchTab('host')">Host Server</button>
            <button class="tab-btn" onclick="switchTab('join')">Private Code</button>
        </div>

        <!-- PUBLIC SERVERS TAB -->
        <div id="tab-public" class="tab-content active">
            <div class="server-list" id="serverList">
                <div style="color: gray; text-align: center; margin-top: 50px;">Fetching servers...</div>
            </div>
            <button class="btn btn-secondary" onclick="fetchPublicServers()">🔄 Refresh List</button>
        </div>

        <!-- HOST SERVER TAB -->
        <div id="tab-host" class="tab-content">
            <input type="text" id="hostRoomName" class="input-box" placeholder="Server Name" maxlength="20">
            <div style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; align-items: center;">
                <label style="font-weight: bold; cursor: pointer;"><input type="radio" name="privacy" value="1" checked> 🌍 Public</label>
                <label style="font-weight: bold; cursor: pointer;"><input type="radio" name="privacy" value="0"> 🔒 Private</label>
            </div>
            <button class="btn btn-green" onclick="createRoom()">➕ Start Server</button>
        </div>

        <!-- JOIN BY CODE TAB -->
        <div id="tab-join" class="tab-content">
            <input type="text" id="joinCode" class="input-box" placeholder="ENTER 6-LETTER CODE" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 5px;">
            <button class="btn btn-blue" onclick="joinByCode()">🔗 Connect</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen">
        <div class="room-info">
            <div id="roomNameDisplay" style="font-size: 18px; color: #fff;">Server Name</div>
            <div id="roomCodeDisplay" style="font-size: 12px; color: #aaa; margin-top: 5px;">CODE: -----</div>
        </div>
        
        <div id="playArea">
            <!-- Players and Pets injected here -->
        </div>

        <div class="chat-container">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type a message and press Enter..." maxlength="50">
        </div>
    </div>

    <script>
        const PET_SHOP = [
            { id: "doge", name: "Pixel Doge", icon: "🐕" }, 
            { id: "cat", name: "Cyber Kitty", icon: "🐈" },
            { id: "frog", name: "Ninja Frog", icon: "🐸" }, 
            { id: "mecha_cat", name: "Mecha Cat", icon: "<img src='../png/mc.png'>", color: "#ff00ff" },
            { id: "dragon", name: "Neon Dragon", icon: "🐲" },
            { id: "panda", name: "Ghost Panda", icon: "🐼" }, 
            { id: "kraken", name: "67 Kraken", icon: "🦑" },
            { id: "midas", name: "King Midas", icon: "<img src='../png/King.png'>", color: "#ffd700" },
            { id: "phoenix", name: "Mythic Phoenix", icon: "<img src='../png/phoenix.png'>", color: "#ff4400" }, 
            { id: "griffin", name: "Flaming Griffin", icon: "<img src='../png/griffin.png'>", color: "#ff4400" },
            { id: "aerodactylus", name: "Eruption Aerodactylus", icon: "<img src='../png/aerodactylus.png'>", color: "#ff4400" }, 
            { id: "gb", name: "Gem Beast", icon: "<img src='../png/gb.png'>", color: "#add8e6" },
            { id: "hs", name: "Void Hound", icon: "<img src='../png/vh.png'>", color: "#add8e6" },
            { id: "gs", name: "Glowing Shadow", icon: "<img src='../png/gs.png'>", color: "#add8e6" },
            { id: "lt", name: "Living Treasure", icon: "<img src='../png/lt.png'>", color: "#ffce1b" },
            { id: "lva", name: "Living Vault", icon: "<img src='../png/lva.png'>", color: "#ffce1b" },
            { id: "kitsune", name: "Sakura Kitsune", icon: "<img src='../png/kitsune.png'>", color: "#ffb7b2" },
            { id: "blossom", name: "Elder Sakura Blossom", icon: "<img src='../png/blossom.png'>", color: "#ffb7b2" },
            { id: "katanaspirit", name: "Katana Spirit", icon: "<img src='../png/spirit.png'>", color: "#ffb7b2" },
            { id: "bn", name: "Blossom Ninetails", icon: "<img src='../png/blossom_ninetails.png'>", color: "#ffb7b2" },
            { id: "crystal_dragon", name: "Crystal Dragon", icon: "<img src='../png/crystal_dragon.png'>", color: "#ffb7b2" },
            { id: "seed", name: "Mysterious Seed", icon: "<img src='../png/seed.png'>", color: "#ffb7b2" },
            { id: "flytrap", name: "Moonlight Flytrap", icon: "<img src='../png/flytrap.png'>", color: "#ffb7b2" },
            { id: "mboe", name: "Moonlight Beast Of Eclipse", icon: "<img src='../png/mboe.png'>", color: "#13265c" },
            { id: "virus_kitty", name: "Virus Kitty", icon: "<img src='../png/virus_kitty.png'>", color: "#276221" },
            { id: "artificial_virus", name: "Artificial Virus", icon: "<img src='../png/artificial_virus.png'>", color: "#276221" },
            { id: "claws_machine", name: "Claws Machine", icon: "<img src='../png/claws_machine.png'>", color: "#276221" },
            { id: "clawed_plushie", name: "Clawed Plushie", icon: "<img src='../png/clawed_plushie.png'>", color: "#276221" },
            { id: "digital_minion", name: "Digital Minion", icon: "<img src='../png/digital_minion.png'>", color: "#276221" },
            { id: "poseidon", name: "Poseidon", icon: "<img src='../png/poseidon.png'>", color: "#276221" },
            { id: "celebration_monkey", name: "Celebration Monkey", icon: "<img src='../png/celebration_monkey.png'>", color: "#dc143c" },
            { id: "reaper", name: "Reaper", icon: "<img src='../png/reaper.png'>", color: "#dc143c" }
        ];

        // --- GAME STATE ---
        let currentRoom = null;
        let myUsername = localStorage.getItem('schoolExamsSavedUser') || "Guest";
        
        let myX = window.innerWidth / 2;
        let myY = window.innerHeight / 2;
        const SPEED = 8;
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        let syncInterval = null;

        // UI Tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.target.classList.add('active');
            
            if(tabId === 'public') fetchPublicServers();
        }

        // --- API HELPER ---
        async function api(action, data = {}) {
            const fd = new FormData();
            fd.append('action', action);
            for (let key in data) fd.append(key, data[key]);
            
            try {
                const res = await fetch('../lobby_backend.php', { method: 'POST', body: fd });
                return await res.json();
            } catch(e) {
                console.error("API Error:", e);
                return { success: false, message: "Connection lost." };
            }
        }

        // --- MENU LOGIC ---
        async function fetchPublicServers() {
            const res = await api('list_public');
            const list = document.getElementById('serverList');
            list.innerHTML = '';
            
            if (res.success && res.servers.length > 0) {
                res.servers.forEach(s => {
                    list.innerHTML += `
                        <div class="server-item">
                            <div>
                                <h3>${s.room_name}</h3>
                                <span>Players: ${s.player_count}/10</span>
                            </div>
                            <button class="btn-join-small" onclick="joinTargetRoom('${s.room_code}', '${s.room_name}')">Join</button>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = `<div style="color: gray; text-align: center; margin-top: 50px;">No open servers found.</div>`;
            }
        }

        async function createRoom() {
            const roomName = document.getElementById('hostRoomName').value || `${myUsername}'s Server`;
            const isPublic = document.querySelector('input[name="privacy"]:checked').value;
            
            const res = await api('create', { room_name: roomName, is_public: isPublic });
            if (res.success) startGame(res.room_code, roomName);
            else alert(res.message);
        }

        async function joinByCode() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if(code.length !== 6) return alert("Code must be 6 letters.");
            joinTargetRoom(code, "Private Server");
        }

        async function joinTargetRoom(code, name) {
            const res = await api('join', { room_code: code });
            if (res.success) startGame(code, name);
            else alert(res.message);
        }

        // --- CORE GAME LOOP ---
        function startGame(code, name) {
            currentRoom = code;
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('roomNameDisplay').innerText = name;
            document.getElementById('roomCodeDisplay').innerText = `CODE: ${code}`;
            document.getElementById('leaveBtn').onclick = () => window.location.reload(); // Quick leave
            
            window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key) && document.activeElement !== document.getElementById('chatInput')) keys[e.key] = true; });
            window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
            
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendChat();
            });

            requestAnimationFrame(gameLoop);
            syncInterval = setInterval(syncWithServer, 100);
        }

        function gameLoop() {
            if (!currentRoom) return;

            if (keys.w || keys.ArrowUp) myY -= SPEED;
            if (keys.s || keys.ArrowDown) myY += SPEED;
            if (keys.a || keys.ArrowLeft) myX -= SPEED;
            if (keys.d || keys.ArrowRight) myX += SPEED;

            if (myX < 20) myX = 20;
            if (myX > window.innerWidth - 20) myX = window.innerWidth - 20;
            if (myY < 20) myY = 20;
            if (myY > window.innerHeight - 80) myY = window.innerHeight - 80;

            requestAnimationFrame(gameLoop);
        }

        async function syncWithServer() {
            const res = await api('sync', { room_code: currentRoom, x: Math.floor(myX), y: Math.floor(myY) });
            if (res.success) renderPlayers(res.players, res.messages);
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            
            input.value = '';

            // --- INSTANT LOCAL UPDATE (Optimistic UI) ---
            // Instantly find your player character and show the text bubble locally!
            const myPlayer = document.querySelector('.player.me');
            if (myPlayer) {
                const bubble = myPlayer.querySelector('.chat-bubble');
                if (bubble) {
                    bubble.innerText = msg;
                    bubble.style.display = 'block';
                }
            }
            
            // --- SEND TO SERVER IN BACKGROUND ---
            // Notice we removed "await" so the game doesn't freeze waiting for the database!
            api('chat', { room_code: currentRoom, message: msg });
        }

        // --- RENDER ENGINE WITH PETS ---
        function renderPlayers(serverPlayers, messages) {
            const area = document.getElementById('playArea');
            
            // Mark all current elements as stale
            Array.from(area.getElementsByClassName('player')).forEach(el => el.dataset.stale = "true");
            Array.from(area.getElementsByClassName('pet-follower')).forEach(el => el.dataset.stale = "true");

            serverPlayers.forEach(p => {
                // 1. RENDER PLAYER
                let el = document.getElementById(`player_${p.user_id}`);
                if (!el) {
                    el = document.createElement('div');
                    el.id = `player_${p.user_id}`;
                    el.className = 'player';
                    if (p.username === myUsername) el.classList.add('me'); 
                    
                    el.innerHTML = `
                        ${p.username.charAt(0).toUpperCase()}
                        <div class="player-name">${p.username}</div>
                        <div class="chat-bubble" id="chat_${p.user_id}" style="display: none;"></div>
                    `;
                    area.appendChild(el);
                }

                if (!el.classList.contains('me')) {
                    el.style.left = `${p.x}px`;
                    el.style.top = `${p.y}px`;
                } else {
                    el.style.left = `${myX}px`;
                    el.style.top = `${myY}px`;
                }
                
                // Handle Chat
                const bubble = document.getElementById(`chat_${p.user_id}`);
                if (messages[p.user_id]) {
                    bubble.innerText = messages[p.user_id];
                    bubble.style.display = 'block';
                } else {
                    bubble.style.display = 'none';
                }

                el.dataset.stale = "false";

                // 2. RENDER EQUIPPED PET
                if (p.active_pet) {
                    let baseId = p.active_pet.split('::')[0];
                    let petInfo = PET_SHOP.find(x => x.id === baseId);
                    
                    if (petInfo) {
                        let petEl = document.getElementById(`pet_${p.user_id}`);
                        if (!petEl) {
                            petEl = document.createElement('div');
                            petEl.id = `pet_${p.user_id}`;
                            petEl.className = 'pet-follower';
                            
                            // Parse Icon safely
                            let iconHTML = petInfo.icon;
                            let match = iconHTML.match(/src='([^']+)'/);
                            if (match) {
                                iconHTML = `<img src="${match[1]}" style="filter: drop-shadow(0 0 5px ${petInfo.color || '#fff'});">`;
                            }
                            petEl.innerHTML = iconHTML;
                            area.appendChild(petEl);
                        }
                        
                        // Make pet trail behind/above player slightly
                        petEl.style.left = `${(el.classList.contains('me') ? myX : p.x) + 25}px`;
                        petEl.style.top = `${(el.classList.contains('me') ? myY : p.y) - 20}px`;
                        petEl.dataset.stale = "false";
                    }
                }
            });

            // Cleanup stales
            Array.from(area.querySelectorAll('[data-stale="true"]')).forEach(el => el.remove());
        }
        
        // Auto-fetch list on boot
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('schoolExamsSavedUser')) {
                fetchPublicServers();
            } else {
                alert("Please log in via the Main Portal first!");
                window.location.href = "../index.html";
            }
        });
    </script>
</body>
</html>
